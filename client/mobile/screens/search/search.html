<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Поиск</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #fff;
        }

        /* Поле поиска в хедере */
        .search-header {
            padding: 50px 16px 15px;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: #7a5cff;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
        }

        .search-input-wrapper {
            flex: 1;
            background: #2b2b3d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 8px 14px;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .search-input-wrapper:focus-within {
            border-color: #7a5cff;
            background: #33334d;
        }

        .search-field {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            outline: none;
            font-size: 16px;
            margin-left: 8px;
        }

        /* Табы категорий */
        .search-tabs {
            display: flex;
            padding: 10px 16px;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .search-tabs::-webkit-scrollbar { display: none; }

        .tab-pill {
            padding: 6px 16px;
            background: #2b2b3d;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.2s;
            color: #888;
        }

        .tab-pill.active {
            background: #7a5cff;
            color: #fff;
        }

        /* Результаты */
        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            -webkit-overflow-scrolling: touch;
        }

        .result-section-title {
            font-size: 12px;
            color: #7a5cff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 10px;
            font-weight: 700;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-item:active { opacity: 0.7; }

        .item-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2b2b3d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .item-info { flex: 1; overflow: hidden; }
        .item-title { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .item-desc { font-size: 13px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .empty-state {
            text-align: center;
            margin-top: 100px;
            color: #444;
        }

        .empty-icon { font-size: 50px; margin-bottom: 10px; opacity: 0.3; }
    </style>
</head>
<body>

    <header class="search-header">
        <button class="back-btn" onclick="window.history.back()">←</button>
        <div class="search-input-wrapper">
            <span>🔍</span>
            <input type="text" id="main-search" class="search-field" placeholder="Люди, группы, сообщения..." autofocus>
        </div>
    </header>

    <nav class="search-tabs">
        <div class="tab-pill active" data-type="all">Все</div>
        <div class="tab-pill" data-type="chats">Чаты</div>
        <div class="tab-pill" data-type="channels">Каналы</div>
        <div class="tab-pill" data-type="messages">Сообщения</div>
    </nav>

    <main class="results-container" id="results">
        <div class="empty-state" id="initial-state">
            <div class="empty-icon">🔎</div>
            <p>Введите запрос для поиска</p>
        </div>
    </main>

    <script type="module">
        const searchInput = document.getElementById('main-search');
        const resultsContainer = document.getElementById('results');
        const tabs = document.querySelectorAll('.tab-pill');

        // Мок-данные для демонстрации
        const mockData = [
            { id: 1, type: 'chats', title: 'Александр', desc: '@alex_crane', icon: '👤' },
            { id: 2, type: 'channels', title: 'Craneapp News', desc: '1.2k подписчиков', icon: '📢' },
            { id: 3, type: 'messages', title: 'Дмитрий', desc: '...пришлю код для Railway завтра...', icon: '💬' }
        ];

        // Логика переключения табов
        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                performSearch(searchInput.value);
            };
        });

        // Живой поиск с debounce (задержкой)
        let debounceTimer;
        searchInput.oninput = (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                performSearch(e.target.value);
            }, 300);
        };

        function performSearch(query) {
            if (!query.trim()) {
                resultsContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">🔎</div><p>Введите запрос</p></div>`;
                return;
            }

            const activeType = document.querySelector('.tab-pill.active').dataset.type;
            const filtered = mockData.filter(item => {
                const matchesQuery = item.title.toLowerCase().includes(query.toLowerCase());
                const matchesType = activeType === 'all' || item.type === activeType;
                return matchesQuery && matchesType;
            });

            renderResults(filtered);
        }

        function renderResults(data) {
            if (data.length === 0) {
                resultsContainer.innerHTML = `<div class="empty-state"><div class="empty-icon">🏜️</div><p>Ничего не найдено</p></div>`;
                return;
            }

            resultsContainer.innerHTML = `
                <div class="result-section-title">Результаты</div>
                ${data.map(item => `
                    <div class="search-item" onclick="handleItemClick('${item.type}', ${item.id})">
                        <div class="item-icon">${item.icon}</div>
                        <div class="item-info">
                            <div class="item-title">${item.title}</div>
                            <div class="item-desc">${item.desc}</div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        window.handleItemClick = (type, id) => {
            console.log(`Переход к ${type} с ID ${id}`);
            // Логика навигации в зависимости от типа
            if(type === 'chats') window.location.href = `../chats/chat.html?id=${id}`;
        };
    </script>
</body>
</html>
