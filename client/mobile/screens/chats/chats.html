<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chats - CraneApp</title>
  <script src="../../app/providers/authProvider.js"></script>
  <script src="../../app/providers/socketProvider.js"></script>
  <script src="../../components/ui/avatar.js"></script>
  <script src="../../components/navigation/tabBar.js"></script>
  <script src="../../components/ui/button.js"></script>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <div class="header-left">
        <button class="header-menu">☰</button>
      </div>
      <div class="header-title">
        <h1>Chats</h1>
      </div>
      <div class="header-right">
        <button class="header-search">🔍</button>
        <button class="header-new-chat">✎</button>
      </div>
    </div>
    
    <div class="chats-container">
      <div class="chat-list" id="chat-list">
        <!-- Dynamic chat items -->
      </div>
    </div>
    
    <div class="floating-action">
      <button id="new-chat-btn" class="fab">✎</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.AuthProvider;
      const socket = window.SocketProvider;
      
      if (!auth.isAuth()) {
        window.location.hash = '/auth/login';
        return;
      }
      
      loadChats();
      
      // Socket events
      window.addEventListener('chat:message', () => loadChats());
      window.addEventListener('user:online', () => loadChats());
      
      // Mock chats data
      window.chatsData = [
        { id: 1, name: 'Alice Johnson', lastMessage: 'Hey! How are you?', time: '14:30', unread: 3, online: true },
        { id: 2, name: 'Bob Wilson', lastMessage: 'See you tomorrow', time: '10:15', unread: 0, online: false },
        { id: 3, name: 'Team Project', lastMessage: 'New task assigned', time: '09:45', unread: 1, online: false, group: true }
      ];
      
      function loadChats() {
        const list = document.getElementById('chat-list');
        list.innerHTML = window.chatsData.map(chat => `
          <div class="chat-item" data-chat-id="${chat.id}">
            <div class="chat-avatar">
              ${CraneAvatar.create({ name: chat.name, size: 56, online: chat.online, type: chat.group ? 'group' : 'user' }).outerHTML}
            </div>
            <div class="chat-info">
              <div class="chat-header">
                <span class="chat-name">${chat.name}</span>
                <span class="chat-time">${chat.time}</span>
              </div>
              <div class="chat-preview">
                <span class="chat-last-message">${chat.lastMessage}</span>
                ${chat.unread > 0 ? `<span class="chat-unread">${chat.unread}</span>` : ''}
              </div>
            </div>
          </div>
        `).join('');
        
        // Chat click handlers
        document.querySelectorAll('.chat-item').forEach(item => {
          item.addEventListener('click', () => {
            const chatId = item.dataset.chatId;
            window.location.hash = `/chat/${chatId}`;
          });
        });
      }
      
      // New chat
      document.getElementById('new-chat-btn').addEventListener('click', () => {
        window.CraneModal.show({
          title: 'New Chat',
          content: '<input id="new-chat-search" placeholder="Search contacts" class="input-field">',
          primaryBtn: { label: 'Create', onClick: () => {
            const search = document.getElementById('new-chat-search').value;
            console.log('Create chat with:', search);
          }}
        });
      });
    });
  </script>
</body>
</html>
