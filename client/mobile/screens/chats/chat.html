<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - CraneApp</title>
  <script src="../../app/providers/authProvider.js"></script>
  <script src="../../app/providers/socketProvider.js"></script>
  <script src="../../components/chat/messageBubble.js"></script>
  <script src="../../components/chat/messageInput.js"></script>
  <script src="../../components/ui/avatar.js"></script>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="chat-header">
      <button class="header-back">←</button>
      <div class="chat-header-info">
        <div class="chat-avatar">
          ${CraneAvatar.create({ name: 'Alice Johnson', size: 40, online: true }).outerHTML}
        </div>
        <div class="chat-user-info">
          <div class="chat-user-name">Alice Johnson</div>
          <div class="chat-user-status">online</div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button class="header-action">📞</button>
        <button class="header-action">📹</button>
        <button class="header-action">☰</button>
      </div>
    </div>
    
    <div class="messages-container" id="messages-container">
      <!-- Dynamic messages -->
    </div>
    
    <div id="message-input"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.AuthProvider;
      const socket = window.SocketProvider;
      
      if (!auth.isAuth()) {
        window.location.hash = '/auth/login';
        return;
      }
      
      const chatId = window.location.hash.match(/chat\/(\d+)/)?.[1] || 1;
      const messagesContainer = document.getElementById('messages-container');
      
      // Mock messages
      window.messagesData = [
        { id: 1, senderId: 2, content: 'Hello! How are you today?', time: '14:20', isOwn: false },
        { id: 2, senderId: 1, content: 'Hey Alice! I\'m doing great, thanks!', time: '14:22', isOwn: true, isRead: true },
        { id: 3, senderId: 2, content: 'Great to hear! What are you working on?', time: '14:23', isOwn: false }
      ];
      
      renderMessages();
      
      // Message input
      const messageInput = CraneMessageInput.create({
        chatId,
        onSend: (content) => {
          const message = {
            id: Date.now(),
            senderId: auth.getUser().id,
            content,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            isOwn: true
          };
          window.messagesData.push(message);
          renderMessages();
          socket.sendMessage(chatId, content);
        },
        onAttach: () => console.log('Attach media'),
        onEmoji: () => console.log('Open emoji'),
        onVoice: () => console.log('Voice message')
      });
      document.getElementById('message-input').appendChild(messageInput);
      
      function renderMessages() {
        messagesContainer.innerHTML = window.messagesData.map(msg => 
          CraneMessageBubble.create({
            ...msg,
            onLongPress: (data) => console.log('Long press:', data)
          })
        ).join('');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
      }
    });
  </script>
</body>
</html>
