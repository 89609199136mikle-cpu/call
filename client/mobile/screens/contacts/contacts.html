<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Контакты</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 0;
            color: #fff;
        }

        /* Поиск в верхней части под хедером */
        .search-bar-container {
            padding: 70px 16px 10px;
            background: #1a1a2e;
        }

        .search-input-wrapper {
            background: #2b2b3d;
            border-radius: 10px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 10px;
        }

        .search-icon { color: #888; font-size: 14px; }

        .search-field {
            background: transparent;
            border: none;
            color: #fff;
            flex: 1;
            outline: none;
            font-size: 15px;
        }

        /* Список контактов */
        #contacts-scroller {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* Таб-бар */
            -webkit-overflow-scrolling: touch;
        }

        .alphabet-label {
            background: rgba(26, 26, 46, 0.8);
            padding: 4px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #7a5cff;
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .contact-row {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
        }

        .contact-row:active { background: rgba(122, 92, 255, 0.1); }

        .contact-img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            background: #2b2b3d;
        }

        .contact-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .contact-name { font-size: 16px; font-weight: 500; }
        .contact-status { font-size: 12px; color: #888; margin-top: 2px; }
        .contact-status.online { color: #4cd964; }

        /* Состояние пустого поиска */
        #empty-results {
            display: none;
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <div class="search-bar-container">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-contacts" class="search-field" placeholder="Поиск контактов...">
        </div>
    </div>

    <main id="contacts-scroller">
        <div id="empty-results">Ничего не найдено</div>
        <div id="contacts-list">
            </div>
    </main>

    <div id="tabbar-mount"></div>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';
        import { TabBar } from '../../components/navigation/tabBar.js';

        // 1. Инициализация Навигации
        const header = new Header({ title: 'Контакты', showBack: false });
        document.getElementById('header-mount').appendChild(header.render());

        const tabBar = new TabBar({ 
            initialTab: 'contacts',
            onTabChange: (id) => {
                if(id !== 'contacts') window.location.href = `../${id}/${id}.html`;
            }
        });
        document.getElementById('tabbar-mount').appendChild(tabBar.render());

        // 2. Мок-данные контактов (отсортированные по алфавиту)
        const allContacts = [
            { id: 1, name: 'Александр', status: 'в сети', online: true, letter: 'А' },
            { id: 4, name: 'Анна', status: 'была 5 минут назад', online: false, letter: 'А' },
            { id: 3, name: 'Дмитрий', status: 'в сети', online: true, letter: 'Д' },
            { id: 2, name: 'Илон Маск', status: 'был недавно', online: false, letter: 'И' }
        ];

        const listContainer = document.getElementById('contacts-list');
        const searchInput = document.getElementById('search-contacts');
        const emptyState = document.getElementById('empty-results');

        function renderContacts(data) {
            listContainer.innerHTML = '';
            let lastLetter = '';

            if (data.length === 0) {
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            data.forEach(contact => {
                // Добавляем разделитель буквы
                if (contact.letter !== lastLetter) {
                    const letterDiv = document.createElement('div');
                    letterDiv.className = 'alphabet-label';
                    letterDiv.textContent = contact.letter;
                    listContainer.appendChild(letterDiv);
                    lastLetter = contact.letter;
                }

                // Создаем строку контакта
                const row = document.createElement('div');
                row.className = 'contact-row';
                row.onclick = () => window.location.href = `contactProfile.html?id=${contact.id}`;
                row.innerHTML = `
                    <img src="https://i.pravatar.cc/150?u=${contact.id}" class="contact-img" alt="avatar">
                    <div class="contact-details">
                        <span class="contact-name">${contact.name}</span>
                        <span class="contact-status ${contact.online ? 'online' : ''}">${contact.status}</span>
                    </div>
                `;
                listContainer.appendChild(row);
            });
        }

        // 3. Логика живого поиска
        searchInput.oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allContacts.filter(c => 
                c.name.toLowerCase().includes(query)
            );
            renderContacts(filtered);
        };

        renderContacts(allContacts);
    </script>
</body>
</html>
