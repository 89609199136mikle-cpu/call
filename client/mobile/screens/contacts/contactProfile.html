<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Профиль</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-x: hidden;
        }

        /* Шапка профиля с градиентом и аватаром */
        .profile-hero {
            position: relative;
            height: 35vh;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 30px;
            background: linear-gradient(to bottom, rgba(122, 92, 255, 0.2), #0f0f1a);
        }

        .profile-avatar-big {
            width: 120px;
            height: 120px;
            border-radius: 40px; /* Скругленный квадрат в стиле Craneapp */
            object-fit: cover;
            border: 3px solid #7a5cff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 16px;
        }

        .profile-name-big { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .profile-status-big { font-size: 14px; color: #4cd964; }

        /* Панель быстрых действий */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 20px 0;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: none;
            border: none;
            color: #7a5cff;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
        }

        .action-icon-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .action-btn:active .action-icon-circle { transform: scale(0.9); background: #252538; }

        /* Информационные блоки */
        .info-section {
            background: #1a1a2e;
            margin: 10px 16px;
            border-radius: 16px;
            padding: 16px;
        }

        .info-item {
            margin-bottom: 20px;
        }

        .info-item:last-child { margin-bottom: 0; }

        .info-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .info-value { font-size: 16px; color: #eee; }
        .info-link { color: #7a5cff; text-decoration: none; }

        /* Опасная зона (удаление/блок) */
        .danger-zone {
            margin: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .danger-btn {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 69, 58, 0.3);
            background: rgba(255, 69, 58, 0.05);
            color: #ff453a;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <div class="profile-hero">
        <img src="https://i.pravatar.cc/300?u=alex" class="profile-avatar-big" id="user-avatar" alt="Profile">
        <h1 class="profile-name-big" id="user-name">Александр</h1>
        <span class="profile-status-big" id="user-status">в сети</span>
    </div>

    <div class="action-bar">
        <button class="action-btn" id="btn-msg">
            <div class="action-icon-circle">💬</div>
            <span>Чат</span>
        </button>
        <button class="action-btn" id="btn-call">
            <div class="action-icon-circle">📞</div>
            <span>Звонок</span>
        </button>
        <button class="action-btn" id="btn-video">
            <div class="action-icon-circle">📹</div>
            <span>Видео</span>
        </button>
    </div>

    <div class="info-section">
        <div class="info-item">
            <span class="info-label">Телефон</span>
            <div class="info-value" id="user-phone">+7 999 123 45 67</div>
        </div>
        <div class="info-item">
            <span class="info-label">О себе</span>
            <div class="info-value" id="user-bio">Product Designer в Craneapp. Люблю чистый код и Railway.</div>
        </div>
        <div class="info-item">
            <span class="info-label">Имя пользователя</span>
            <div class="info-value"><a href="#" class="info-link" id="user-handle">@alex_crane</a></div>
        </div>
    </div>

    <div class="danger-zone">
        <div class="danger-btn">Заблокировать</div>
        <div class="danger-btn">Удалить контакт</div>
    </div>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';

        // 1. Инициализация прозрачного хедера (только кнопка назад)
        const header = new Header({
            title: '',
            showBack: true,
            onBack: () => window.history.back()
        });
        const headerEl = header.render();
        headerEl.style.background = 'transparent';
        headerEl.style.border = 'none';
        document.getElementById('header-mount').appendChild(headerEl);

        // 2. Получение ID из URL и загрузка данных
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        console.log(`Загрузка профиля для ID: ${userId}`);
        
        // Кнопка перехода в чат
        document.getElementById('btn-msg').onclick = () => {
            window.location.href = `../chats/chat.html?id=${userId}`;
        };

        // Логика звонка (вызов screens/calls/call.html)
        document.getElementById('btn-call').onclick = () => {
            window.location.href = `../calls/call.html?id=${userId}&type=audio`;
        };
    </script>
</body>
</html>
