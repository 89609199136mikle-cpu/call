<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Мой Профиль</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Шапка профиля */
        .my-profile-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            padding: 60px 20px 30px;
            text-align: center;
            border-bottom: 1px solid rgba(122, 92, 255, 0.1);
        }

        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }

        .my-avatar {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 2px solid #7a5cff;
            box-shadow: 0 15px 35px rgba(122, 92, 255, 0.2);
        }

        .edit-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #7a5cff;
            width: 32px;
            height: 32px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #0f0f1a;
            font-size: 16px;
            cursor: pointer;
        }

        .my-name { font-size: 22px; font-weight: 700; margin: 0; }
        .my-handle { color: #7a5cff; font-size: 14px; margin-top: 4px; display: block; }

        /* Список опций */
        .menu-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .menu-group {
            background: #1a1a2e;
            border-radius: 20px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 16px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: rgba(122, 92, 255, 0.1); }

        .menu-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(122, 92, 255, 0.1);
            color: #7a5cff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .menu-label { flex: 1; font-size: 16px; }
        .menu-value { color: #888; font-size: 14px; }
        .menu-arrow { color: #444; font-size: 18px; }

        .logout-btn {
            color: #ff453a;
            justify-content: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="my-profile-header">
        <div class="avatar-container">
            <img src="https://i.pravatar.cc/300?u=me" class="my-avatar" id="display-avatar">
            <div class="edit-badge" onclick="window.location.href='editProfile.html'">✏️</div>
        </div>
        <h1 class="my-name" id="display-name">Dev User</h1>
        <span class="my-handle" id="display-handle">@crane_developer</span>
    </div>

    <main class="menu-section">
        <div class="menu-group">
            <div class="menu-item" onclick="window.location.href='editProfile.html'">
                <div class="menu-icon">👤</div>
                <div class="menu-label">Личные данные</div>
                <div class="menu-arrow">›</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">📱</div>
                <div class="menu-label">Номер</div>
                <div class="menu-value">+7 900 123-45-67</div>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-item" onclick="window.location.href='../settings/settings.html'">
                <div class="menu-icon">⚙️</div>
                <div class="menu-label">Настройки приложения</div>
                <div class="menu-arrow">›</div>
            </div>
            <div class="menu-item">
                <div class="menu-icon">🔒</div>
                <div class="menu-label">Конфиденциальность</div>
                <div class="menu-arrow">›</div>
            </div>
        </div>

        <div class="menu-group">
            <div class="menu-item logout-btn" id="logout-trigger">
                <span>Выйти из аккаунта</span>
            </div>
        </div>
    </main>

    <div id="tabbar-mount"></div>

    <script type="module">
        import { TabBar } from '../../components/navigation/tabBar.js';
        import { authStore } from '../../store/authStore.js';

        // 1. Инициализация таб-бара
        const tabBar = new TabBar({
            initialTab: 'profile',
            onTabChange: (id) => {
                if(id !== 'profile') window.location.href = `../${id}/${id}.html`;
            }
        });
        document.getElementById('tabbar-mount').appendChild(tabBar.render());

        // 2. Загрузка данных из Store
        const user = authStore.getUser();
        if (user) {
            document.getElementById('display-name').textContent = user.name || 'User';
            document.getElementById('display-handle').textContent = `@${user.username || 'id' + user.id}`;
        }

        // 3. Выход
        document.getElementById('logout-trigger').onclick = () => {
            if(confirm('Вы уверены, что хотите выйти?')) {
                authStore.clear();
                window.location.href = '../auth/login.html';
            }
        };
    </script>
</body>
</html>
