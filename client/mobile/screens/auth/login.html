<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Craneapp - Вход</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        /* Специфичные стили для экрана логина, которые позже можно вынести в theme/ */
        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 360px;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 10px rgba(122, 92, 255, 0.5));
        }

        .auth-title {
            color: #fff;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        /* Используем переменные, которые заложены в наших UI компонентах */
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #2b2b3d;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .auth-input:focus {
            border-color: #7a5cff;
        }

        .auth-button {
            width: 100%;
            padding: 14px;
            background: #7a5cff;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.1s, background 0.3s;
        }

        .auth-button:active {
            transform: scale(0.98);
            background: #6a4df4;
        }

        .auth-footer {
            margin-top: 24px;
            color: #888;
            font-size: 14px;
        }

        .auth-link {
            color: #7a5cff;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <svg class="auth-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#7a5cff"/>
            <path d="M30 70L50 30L70 70H30Z" fill="white"/>
        </svg>

        <h1 class="auth-title">С возвращением!</h1>
        <p class="auth-subtitle">Введите данные для входа в Craneapp</p>

        <form id="login-form">
            <div class="form-group">
                <input type="text" id="phone" class="auth-input" placeholder="Номер телефона" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" class="auth-input" placeholder="Пароль" required>
            </div>
            <button type="submit" class="auth-button">Войти</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a href="register.html" class="auth-link">Зарегистрироваться</a>
        </div>
    </div>

    <script type="module">
        import { Modal } from '../../components/ui/modal.js';

        const form = document.getElementById('login-form');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            // Простая валидация перед отправкой
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            if (phone && password) {
                console.log('Попытка входа:', phone);
                // Здесь будет вызов из services/api/authApi.js
                // И редирект через navigation.js
            } else {
                const errorModal = new Modal({
                    title: 'Ошибка',
                    content: 'Пожалуйста, заполните все поля.',
                    actions: [{ text: 'ОК', type: 'primary', onClick: (m) => m.close() }]
                });
                errorModal.show();
            }
        };
    </script>
</body>
</html>
