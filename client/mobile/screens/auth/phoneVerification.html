<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enter Code - CraneApp</title>
  <script src="../app/providers/authProvider.js"></script>
  <script src="../../components/ui/button.js"></script>
</head>
<body class="theme-telegram">
  <div class="auth-container">
    <div class="auth-header">
      <div class="auth-step">Step 2 of 3</div>
      <h1>Enter verification code</h1>
      <p id="phone-number">Code sent to +7 (999) 123-45-67</p>
      <div class="code-timer">Resend code in <span id="timer">59</span>s</div>
    </div>
    
    <div class="auth-form">
      <div class="code-inputs">
        <input type="text" maxlength="1" class="code-input" data-index="0">
        <input type="text" maxlength="1" class="code-input" data-index="1">
        <input type="text" maxlength="1" class="code-input" data-index="2">
        <input type="text" maxlength="1" class="code-input" data-index="3">
        <input type="text" maxlength="1" class="code-input" data-index="4">
        <input type="text" maxlength="1" class="code-input" data-index="5">
      </div>
      
      <button id="verify-btn" class="btn btn--primary btn--lg" style="width: 100%;" disabled>
        Verify
      </button>
      
      <div class="auth-footer">
        <button id="change-number" class="text-link">Wrong number?</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.AuthProvider;
      let code = '';
      let countdown = 59;
      
      const inputs = document.querySelectorAll('.code-input');
      const verifyBtn = document.getElementById('verify-btn');
      const timerEl = document.getElementById('timer');
      
      // Auto-focus + next input
      inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          code += e.target.value;
          if (index < 5 && e.target.value) {
            inputs[index + 1].focus();
          }
          updateVerifyButton();
        });
        
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !e.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });
      });
      
      function updateVerifyButton() {
        verifyBtn.disabled = code.length !== 6;
      }
      
      // Timer
      const timer = setInterval(() => {
        countdown--;
        timerEl.textContent = countdown;
        if (countdown <= 0) {
          clearInterval(timer);
          document.querySelector('.code-timer').innerHTML = 
            '<button id="resend-code" class="text-link">Resend code</button>';
        }
      }, 1000);
      
      // Verify
      verifyBtn.addEventListener('click', async () => {
        verifyBtn.classList.add('loading');
        try {
          const result = await auth.login({ 
            identifier: window.currentLogin,
            code: code 
          });
          if (result.success) {
            window.location.hash = '/chats';
          }
        } catch (error) {
          console.error('Verification failed:', error);
        }
        verifyBtn.classList.remove('loading');
      });
      
      // Resend
      document.addEventListener('click', (e) => {
        if (e.target.id === 'resend-code') {
          // Resend logic
          countdown = 59;
        }
      });
    });
  </script>
</body>
</html>
