<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Features - CraneApp</title>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Experimental Features</div>
    </div>
    
    <div class="settings-container">
      <div class="settings-section">
        <h3>Upcoming Features</h3>
        <div class="feature-item">
          <span>Premium Stickers</span>
          <span class="feature-status">Beta</span>
        </div>
        <div class="feature-item">
          <span>Voice Transcription</span>
          <span class="feature-status">Soon</span>
        </div>
        <div class="feature-item">
          <span>End-to-End Encryption</span>
          <span class="feature-status">Beta</span>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Developer Options</h3>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Debug Mode</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Performance Monitor</span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
