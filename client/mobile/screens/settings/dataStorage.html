<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data & Storage - CraneApp</title>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Data & Storage</div>
    </div>
    
    <div class="settings-container">
      <div class="storage-usage">
        <div class="storage-bar">
          <div class="storage-used" style="width: 65%;"></div>
        </div>
        <div class="storage-info">
          <span>5.2 GB of 15 GB used</span>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Storage Usage</h3>
        <div class="storage-list">
          <div class="storage-item">
            <span>Photos</span>
            <span>2.1 GB</span>
          </div>
          <div class="storage-item">
            <span>Videos</span>
            <span>2.3 GB</span>
          </div>
          <div class="storage-item">
            <span>Files</span>
            <span>0.8 GB</span>
          </div>
        </div>
        <button class="btn btn--destructive btn--sm">Clear Cache</button>
      </div>
      
      <div class="settings-section">
        <h3>Automatic Media Download</h3>
        <label class="settings-toggle">
          <input type="checkbox" checked>
          <span>Photos</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Videos</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Files</span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
