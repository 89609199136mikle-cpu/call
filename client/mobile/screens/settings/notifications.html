<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - CraneApp</title>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Notifications</div>
    </div>
    
    <div class="settings-container">
      <div class="settings-section">
        <h3>Private Chats</h3>
        <label class="settings-toggle">
          <input type="checkbox" checked>
          <span>Message notifications</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Group message notifications</span>
        </label>
      </div>
      
      <div class="settings-section">
        <h3>Groups & Channels</h3>
        <label class="settings-toggle">
          <input type="checkbox" checked>
          <span>Group notifications</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Channel notifications</span>
        </label>
      </div>
      
      <div class="settings-section">
        <h3>Sounds</h3>
        <select class="settings-select">
          <option>Default</option>
          <option>Telegram</option>
          <option>Pop</option>
          <option>Silent</option>
        </select>
      </div>
      
      <div class="settings-section">
        <h3>Vibration</h3>
        <label class="settings-toggle">
          <input type="checkbox" checked>
          <span>Vibrate on silent</span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
