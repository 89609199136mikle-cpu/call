<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance - CraneApp</title>
  <script src="../../app/providers/themeProvider.js"></script>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Appearance</div>
    </div>
    
    <div class="settings-container">
      <div class="settings-section">
        <h3>Theme</h3>
        <div class="theme-selector">
          <button class="theme-btn active" data-theme="telegram">Telegram</button>
          <button class="theme-btn" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="light">Light</button>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Chat Background</h3>
        <div class="background-grid">
          <div class="bg-preview default active"></div>
          <div class="bg-preview pattern-1"></div>
          <div class="bg-preview pattern-2"></div>
          <div class="bg-preview gradient"></div>
          <button class="btn btn--secondary btn--sm">+ Upload</button>
        </div>
      </div>
      
      <div class="settings-section">
        <label class="settings-toggle">
          ${window.CraneToggle ? CraneToggle.create({ checked: true }).outerHTML : '<input type="checkbox" checked>'}
          <span>Auto-night mode</span>
        </label>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const themeProvider = window.ThemeProvider;
      
      // Theme switching
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelector('.theme-btn.active')?.classList.remove('active');
          btn.classList.add('active');
          themeProvider.setTheme(btn.dataset.theme);
        });
      });
      
      // Background switching
      document.querySelectorAll('.bg-preview').forEach(preview => {
        preview.addEventListener('click', () => {
          document.querySelector('.bg-preview.active')?.classList.remove('active');
          preview.classList.add('active');
          document.body.style.backgroundImage = preview.classList.contains('default') 
            ? 'none' : `url(${preview.className.replace('bg-preview ', '')}.jpg)`;
        });
      });
    });
  </script>
</body>
</html>
