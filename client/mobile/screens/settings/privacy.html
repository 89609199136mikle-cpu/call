<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy - CraneApp</title>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Privacy & Security</div>
    </div>
    
    <div class="settings-container">
      <div class="settings-section">
        <h3>Phone Number</h3>
        <div class="privacy-options">
          <div class="privacy-item">
            <span>Who can see my phone number</span>
            <select class="privacy-select">
              <option>Everybody</option>
              <option>My Contacts</option>
              <option>Nobody</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Profile Photo</h3>
        <div class="privacy-options">
          <div class="privacy-item">
            <span>Who can see my profile photo</span>
            <select class="privacy-select">
              <option>Everybody</option>
              <option>My Contacts</option>
              <option>Nobody</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Last Seen</h3>
        <div class="privacy-options">
          <div class="privacy-item">
            <span>Who can see when I'm online</span>
            <select class="privacy-select">
              <option>Everybody</option>
              <option>My Contacts</option>
              <option>Nobody</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="settings-section">
        <h3>Two-Step Verification</h3>
        <button class="btn btn--primary btn--sm">Set Up</button>
      </div>
      
      <div class="settings-section">
        <h3>Active Sessions</h3>
        <a href="#" class="settings-item">1 active session</a>
      </div>
    </div>
  </div>
</body>
</html>
