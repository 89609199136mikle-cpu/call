<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Saving - CraneApp</title>
</head>
<body class="theme-telegram">
  <div class="screen-container">
    <div class="header">
      <button class="header-back">←</button>
      <div class="header-title">Power Saving</div>
    </div>
    
    <div class="settings-container">
      <div class="settings-section">
        <h3>Reduce Animation</h3>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Reduce motion</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Disable sticker animations</span>
        </label>
      </div>
      
      <div class="settings-section">
        <h3>Background Activity</h3>
        <label class="settings-toggle">
          <input type="checkbox" checked>
          <span>Disable background activity</span>
        </label>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Disable in-call notifications</span>
        </label>
      </div>
      
      <div class="settings-section">
        <h3>Auto-Download</h3>
        <label class="settings-toggle">
          <input type="checkbox">
          <span>Disable auto-downloading media</span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
