<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Язык</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Поиск языка */
        .search-container {
            padding: 75px 16px 15px;
            background: #1a1a2e;
        }

        .lang-search {
            width: 100%;
            background: #2b2b3d;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
        }

        .lang-search::placeholder { color: #666; }

        /* Список языков */
        .lang-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 40px;
            -webkit-overflow-scrolling: touch;
        }

        .lang-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #1a1a2e;
            margin-bottom: 8px;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .lang-item:active { transform: scale(0.98); }

        .lang-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .lang-name { font-size: 16px; font-weight: 500; }
        .lang-native { font-size: 13px; color: #7a5cff; }

        .check-icon {
            color: #7a5cff;
            font-size: 18px;
            display: none;
        }

        .lang-item.active .check-icon { display: block; }
        .lang-item.active { border: 1px solid rgba(122, 92, 255, 0.3); }
    </style>
</head>
<body>

    <div id="header-mount"></div>

    <div class="search-container">
        <input type="text" class="lang-search" id="search" placeholder="Поиск языка...">
    </div>

    <main class="lang-list" id="list">
        </main>

    <script type="module">
        import { Header } from '../../components/navigation/header.js';

        const header = new Header({
            title: 'Язык',
            showBack: true,
            onBack: () => window.history.back()
        });
        document.getElementById('header-mount').appendChild(header.render());

        const languages = [
            { id: 'ru', name: 'Русский', native: 'Russian' },
            { id: 'en', name: 'English', native: 'English' },
            { id: 'de', name: 'Deutsch', native: 'German' },
            { id: 'fr', name: 'Français', native: 'French' },
            { id: 'es', name: 'Español', native: 'Spanish' },
            { id: 'it', name: 'Italiano', native: 'Italian' },
            { id: 'zh', name: '中文', native: 'Chinese' },
            { id: 'ar', name: 'العربية', native: 'Arabic' }
        ];

        let currentLang = localStorage.getItem('crane_lang') || 'ru';
        const listEl = document.getElementById('list');
        const searchInput = document.getElementById('search');

        function renderLanguages(filter = '') {
            const filtered = languages.filter(l => 
                l.name.toLowerCase().includes(filter.toLowerCase()) || 
                l.native.toLowerCase().includes(filter.toLowerCase())
            );

            listEl.innerHTML = filtered.map(lang => `
                <div class="lang-item ${lang.id === currentLang ? 'active' : ''}" 
                     onclick="setLanguage('${lang.id}')">
                    <div class="lang-info">
                        <span class="lang-name">${lang.name}</span>
                        <span class="lang-native">${lang.native}</span>
                    </div>
                    <div class="check-icon">✓</div>
                </div>
            `).join('');
        }

        window.setLanguage = (id) => {
            currentLang = id;
            localStorage.setItem('crane_lang', id);
            renderLanguages();
            
            // В реальном приложении здесь вызывался бы i18n.changeLanguage(id)
            console.log(`Язык изменен на: ${id}`);
            
            // Небольшая задержка перед возвратом для визуального подтверждения
            setTimeout(() => window.history.back(), 300);
        };

        searchInput.oninput = (e) => renderLanguages(e.target.value);

        renderLanguages();
    </script>
</body>
</html>
