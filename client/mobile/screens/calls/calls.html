<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp - Звонок</title>
    <link rel="stylesheet" href="../../../public/styles.css">
    <style>
        body {
            background-color: #0f0f1a;
            margin: 0;
            height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* Задний фон с размытием (динамический аватар) */
        .call-background {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(15, 15, 26, 0.8), #0f0f1a), 
                        url('https://i.pravatar.cc/600?u=alex') center/cover;
            filter: blur(40px);
            z-index: -1;
            transform: scale(1.1);
        }

        /* Верхняя панель: Инфо о звонке */
        .call-header {
            margin-top: 80px;
            text-align: center;
            animation: fadeInDown 0.6s ease-out;
        }

        .caller-avatar {
            width: 120px;
            height: 120px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .caller-name { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .call-status { 
            font-size: 16px; 
            color: #7a5cff; 
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Анимация пульсации для статуса "Вызов..." */
        .pulse {
            animation: pulse-text 1.5s infinite;
        }

        @keyframes pulse-text {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Центральная зона для видео (скрыта по умолчанию) */
        #video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #000;
        }

        /* Нижняя панель управления */
        .call-controls {
            width: 100%;
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            justify-items: center;
            max-width: 320px;
        }

        .control-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .control-btn.active .icon-circle {
            background: #fff;
            color: #0f0f1a;
        }

        .btn-end {
            background: #ff453a !important;
            color: white !important;
            box-shadow: 0 0 20px rgba(255, 69, 58, 0.4);
        }

        .btn-end:active { transform: scale(0.9); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="call-background"></div>

    <header class="call-header">
        <img src="https://i.pravatar.cc/300?u=alex" class="caller-avatar" alt="Avatar">
        <div class="caller-name">Александр</div>
        <div class="call-status pulse" id="status">Вызов...</div>
    </header>

    <div id="video-container">
        </div>

    <div class="call-controls">
        <button class="control-btn" id="toggle-mic">
            <div class="icon-circle">🎤</div>
            <span>Микро</span>
        </button>
        
        <button class="control-btn" id="toggle-video">
            <div class="icon-circle">📹</div>
            <span>Видео</span>
        </button>

        <button class="control-btn" id="toggle-speaker">
            <div class="icon-circle">🔊</div>
            <span>Динамик</span>
        </button>

        <div style="grid-column: span 3; margin-top: 20px;">
            <button class="control-btn" id="end-call">
                <div class="icon-circle btn-end">📞</div>
                <span>Завершить</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { webrtcService } from '../../services/call-service/webrtc.js';

        const statusEl = document.getElementById('status');
        const endBtn = document.getElementById('end-call');
        const micBtn = document.getElementById('toggle-mic');

        // Имитация начала разговора через 3 секунды
        setTimeout(() => {
            statusEl.classList.remove('pulse');
            statusEl.style.color = '#4cd964';
            startTimer();
        }, 3000);

        let seconds = 0;
        function startTimer() {
            setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                statusEl.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }, 1000);
        }

        // Обработка кнопок
        micBtn.onclick = () => {
            micBtn.classList.toggle('active');
            const isMuted = micBtn.classList.contains('active');
            micBtn.querySelector('.icon-circle').textContent = isMuted ? '🔇' : '🎤';
        };

        endBtn.onclick = () => {
            // webrtcService.hangup();
            window.history.back();
        };

        // Блокировка выключения экрана (если поддерживается)
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(() => {});
        }
    </script>
</body>
</html>
