<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call - CraneApp</title>
  <script src="../../app/providers/authProvider.js"></script>
  <script src="../../app/providers/socketProvider.js"></script>
  <script src="../../components/ui/avatar.js"></script>
</head>
<body class="theme-telegram">
  <div class="call-screen">
    <div class="call-header">
      <button class="header-back">←</button>
      <div class="call-user">
        ${CraneAvatar.create({ name: 'Alice Johnson', size: 80, online: true }).outerHTML}
        <div class="call-user-info">
          <h2>Alice Johnson</h2>
          <div class="call-status">Calling...</div>
        </div>
      </div>
      <div class="call-timer" id="call-timer">00:00</div>
    </div>
    
    <div class="call-content">
      <div class="call-waveform"></div>
      <div class="call-video-placeholder">
        <div class="call-avatar-large">
          ${CraneAvatar.create({ name: 'Alice Johnson', size: 200 }).outerHTML}
        </div>
      </div>
    </div>
    
    <div class="call-controls">
      <button class="call-control mute" data-action="mute">🔇</button>
      <button class="call-control speaker" data-action="speaker">📢</button>
      <button class="call-control video" data-action="video">📹</button>
      <button class="call-control end-call" data-action="end">📞</button>
      <button class="call-control mic" data-action="mic">🎤</button>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const auth = window.AuthProvider;
      const socket = window.SocketProvider;
      
      if (!auth.isAuth()) {
        window.location.hash = '/auth/login';
        return;
      }
      
      let callTime = 0;
      let timer;
      
      // Call timer
      function startTimer() {
        timer = setInterval(() => {
          callTime++;
          const minutes = Math.floor(callTime / 60);
          const seconds = callTime % 60;
          document.getElementById('call-timer').textContent = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);
      }
      
      startTimer();
      
      // Call controls
      document.querySelectorAll('.call-control').forEach(btn => {
        btn.addEventListener('click', () => {
          const action = btn.dataset.action;
          
          switch(action) {
            case 'end':
              clearInterval(timer);
              window.location.hash = '/calls';
              break;
            case 'mute':
              btn.classList.toggle('active');
              btn.innerHTML = btn.classList.contains('active') ? '🔕' : '🔇';
              break;
            case 'speaker':
              btn.classList.toggle('active');
              break;
            case 'video':
              btn.classList.toggle('active');
              document.querySelector('.call-video-placeholder').classList.toggle('video-on');
              break;
            case 'mic':
              // Toggle microphone
              break;
          }
        });
      });
      
      // Socket call events
      window.addEventListener('call:offer', (e) => {
        console.log('Incoming call:', e.detail);
      });
    });
  </script>
</body>
</html>
