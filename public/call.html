<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Secure Call</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f1721;
            --accent: #248bcf;
            --red: #ff3b30;
            --green: #34c759;
            --text: #ffffff;
            --secondary: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Динамический фон для эффекта "дорогого" приложения */
        .gradient-bg {
            position: absolute;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1c2c3e 0%, #0f1721 100%);
        }

        .animated-blob {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(36,139,207,0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-30%, -30%) scale(1); }
            to { transform: translate(40%, 20%) scale(1.2); }
        }

        /* Слой видео */
        .video-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: #000;
            display: none;
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-preview-card {
            position: absolute;
            top: 40px;
            right: 20px;
            width: 110px;
            height: 160px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 100;
            background: #000;
            display: none;
            transition: transform 0.3s;
        }

        #local-video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* UI управления */
        .call-ui {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 80px 24px 60px;
            background: linear-gradient(to bottom, rgba(15,23,33,0.7) 0%, transparent 40%, transparent 60%, rgba(15,23,33,0.9) 100%);
        }

        .user-profile { text-align: center; }

        .avatar-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
        }

        .avatar-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a7ea, #248bcf);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            font-weight: bold;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            z-index: 2;
        }

        .pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            z-index: 1;
            animation: pulse-ring 2.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.6; }
            100% { transform: scale(1.9); opacity: 0; }
        }

        .peer-name { font-size: 36px; font-weight: 700; margin-bottom: 8px; }
        .call-status { font-size: 18px; color: var(--secondary); letter-spacing: 0.5px; }

        /* Кнопки управления */
        .controls-panel {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-circle {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .icon-circle svg { width: 30px; height: 30px; fill: #fff; }

        .icon-circle.hangup { background: var(--red); transform: rotate(135deg); width: 80px; height: 80px; }
        .icon-circle.accept { background: var(--green); width: 80px; height: 80px; animation: shake 2s infinite; }

        .icon-circle.active { background: #fff; }
        .icon-circle.active svg { fill: #000; }

        .btn-label { font-size: 14px; color: var(--secondary); font-weight: 500; }

        @keyframes shake {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1) rotate(-3deg); }
            20%, 40% { transform: scale(1.1) rotate(3deg); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="gradient-bg">
        <div class="animated-blob"></div>
    </div>

    <div class="video-container" id="remote-wrapper">
        <video id="remote-video" autoplay playsinline></video>
    </div>
    <div class="local-preview-card" id="local-wrapper">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="call-ui">
        <div class="user-profile">
            <div class="avatar-wrapper" id="ring-anim">
                <div class="pulse"></div>
                <div class="pulse" style="animation-delay: 0.8s"></div>
                <div class="avatar-circle" id="user-initial">?</div>
            </div>
            <h1 class="peer-name" id="user-name">Загрузка...</h1>
            <p class="call-status" id="status-label">Инициализация протоколов...</p>
        </div>

        <div class="controls-panel">
            <div class="action-btn" id="toggle-mic">
                <div class="icon-circle" id="mic-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </div>
                <span class="btn-label">Звук</span>
            </div>

            <div class="action-btn hidden" id="answer-btn">
                <div class="icon-circle accept">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <span class="btn-label">Принять</span>
            </div>

            <div class="action-btn" id="hangup-btn">
                <div class="icon-circle hangup">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <span class="btn-label" id="hangup-label">Отмена</span>
            </div>

            <div class="action-btn" id="toggle-video">
                <div class="icon-circle" id="video-icon">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </div>
                <span class="btn-label">Видео</span>
            </div>
        </div>
    </div>

    <audio id="dial-sound" src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3" loop></audio>
    <audio id="ring-sound" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>

    <script>
        // ========== WEBRTC & SIGNALING CORE ==========
        const socket = io();
        let pc = null;
        let localStream = null;
        let isStarted = false;
        
        // Буфер для кандидатов (критически важно для исправления бесконечного подключения)
        let remoteCandidatesQueue = [];

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            iceCandidatePoolSize: 10
        };

        const callInfo = JSON.parse(localStorage.getItem('craheapp_call') || '{}');
        const userInfo = JSON.parse(localStorage.getItem('craheapp_user') || '{}');

        const statusLabel = document.getElementById('status-label');
        const nameLabel = document.getElementById('user-name');
        const initialLabel = document.getElementById('user-initial');

        async function initCall() {
            if (!callInfo.targetUserId && !callInfo.fromUserId) return window.close();

            const partnerName = callInfo.isIncoming ? callInfo.fromUsername : callInfo.targetUsername;
            nameLabel.innerText = partnerName;
            initialLabel.innerText = partnerName[0].toUpperCase();

            // Регистрация сокета на ID пользователя (чтобы сервер знал, куда слать ответ)
            socket.emit('call:register', { userId: userInfo.id, username: userInfo.name });

            if (callInfo.isIncoming) {
                statusLabel.innerText = "Входящий вызов...";
                document.getElementById('answer-btn').classList.remove('hidden');
                document.getElementById('ring-sound').play();
            } else {
                statusLabel.innerText = "Вызов...";
                document.getElementById('dial-sound').play();
                startOutgoingCall();
            }
        }

        async function startOutgoingCall() {
            await prepareLocalStream();
            socket.emit('call:request', {
                to: callInfo.targetUserId,
                from: userInfo.id,
                fromName: userInfo.name
            });
        }

        async function prepareLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                document.getElementById('local-video').srcObject = localStream;
                document.getElementById('local-wrapper').style.display = 'block';
                // По умолчанию видео выключено для экономии, если не нажата кнопка
                localStream.getVideoTracks().forEach(t => t.enabled = false);
            } catch (e) {
                console.error("Медиа недоступно", e);
                statusLabel.innerText = "Ошибка: нет доступа к микрофону";
            }
        }

        async function setupPeer(targetId) {
            pc = new RTCPeerConnection(rtcConfig);

            // Добавление локальных треков
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            // Обработка удаленного потока
            pc.ontrack = (event) => {
                const remoteVideo = document.getElementById('remote-video');
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    document.getElementById('remote-wrapper').style.display = 'block';
                    document.getElementById('ring-anim').classList.remove('ringing');
                    statusLabel.innerText = "Разговор...";
                }
            };

            // Генерация ICE кандидатов
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('call:ice-candidate', {
                        to: targetId,
                        candidate: event.candidate
                    });
                }
            };

            pc.onconnectionstatechange = () => {
                console.log("Connection State:", pc.connectionState);
                if (pc.connectionState === 'connected') statusLabel.innerText = "Соединено";
                if (pc.connectionState === 'failed') endCall();
            };
        }

        // --- Обработка сигналов ---

        socket.on('call:accepted', async (data) => {
            document.getElementById('dial-sound').pause();
            statusLabel.innerText = "Подключение...";
            await setupPeer(callInfo.targetUserId);
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            socket.emit('call:offer', { to: callInfo.targetUserId, offer });
        });

        socket.on('call:offer', async (data) => {
            if (!pc) await setupPeer(data.from);
            
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            
            // После установки RemoteDescription можно добавить накопленных кандидатов
            while(remoteCandidatesQueue.length > 0) {
                await pc.addIceCandidate(remoteCandidatesQueue.shift());
            }

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            
            socket.emit('call:answer', { to: data.from, answer });
        });

        socket.on('call:answer', async (data) => {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('call:ice-candidate', async (data) => {
            const candidate = new RTCIceCandidate(data.candidate);
            if (pc && pc.remoteDescription) {
                await pc.addIceCandidate(candidate);
            } else {
                remoteCandidatesQueue.push(candidate);
            }
        });

        // --- Управление ---

        document.getElementById('answer-btn').onclick = async () => {
            document.getElementById('ring-sound').pause();
            document.getElementById('answer-btn').classList.add('hidden');
            statusLabel.innerText = "Соединение...";
            await prepareLocalStream();
            socket.emit('call:accept', { to: callInfo.fromUserId });
        };

        function endCall() {
            if (pc) pc.close();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            socket.emit('call:end', { to: callInfo.isIncoming ? callInfo.fromUserId : callInfo.targetUserId });
            window.close();
        }

        document.getElementById('hangup-btn').onclick = endCall;
        socket.on('call:ended', () => window.close());

        initCall();
    </script>
</body>
</html>
