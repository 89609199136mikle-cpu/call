<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Звонок — Craheapp Premium</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --tg-bg: #0f1721;
            --tg-accent: #248bcf;
            --tg-red: #eb5545;
            --tg-green: #4cd964;
            --tg-text: #ffffff;
            --tg-secondary: rgba(255, 255, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--tg-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--tg-text);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Анимированный динамический фон */
        .background-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a2a3a 0%, #0f1721 100%);
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(36,139,207,0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(30%, 20%); }
        }

        /* Видео контейнеры */
        .video-wrapper {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: black;
            display: none; /* Включается при видеозвонке */
        }

        #remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-preview {
            position: absolute;
            top: calc(20px + var(--safe-top));
            right: 20px;
            width: 100px;
            height: 150px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1.5px solid rgba(255,255,255,0.2);
            z-index: 100;
            background: #000;
            display: none;
        }

        #local-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* Интерфейс поверх всего */
        .ui-layer {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: calc(60px + var(--safe-top)) 20px calc(40px + var(--safe-bottom));
            background: linear-gradient(to bottom, rgba(15,23,33,0.4) 0%, transparent 30%, transparent 70%, rgba(15,23,33,0.8) 100%);
        }

        .header-info {
            text-align: center;
            animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .avatar-box {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
        }

        .main-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #50a7ea 0%, #248bcf 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 600;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            z-index: 2;
            position: relative;
        }

        .pulse-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: var(--tg-accent);
            opacity: 0;
            z-index: 1;
        }

        .ringing .pulse-ring {
            animation: ring-pulse 2s infinite;
        }

        @keyframes ring-pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .caller-name {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .status-text {
            font-size: 17px;
            color: var(--tg-secondary);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Панель управления */
        .controls-grid {
            width: 100%;
            max-width: 360px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: center;
            justify-items: center;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            width: 100%;
        }

        .circle-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .circle-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        .circle-btn.active {
            background: #fff;
        }

        .circle-btn.active svg {
            fill: #000;
        }

        .circle-btn.red {
            background: var(--tg-red);
            width: 76px;
            height: 76px;
        }

        .circle-btn.green {
            background: var(--tg-green);
            width: 76px;
            height: 76px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .btn-desc {
            font-size: 13px;
            color: var(--tg-secondary);
            font-weight: 500;
        }

        /* Всплывающее уведомление */
        .toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="background-layer">
        <div class="bg-blob"></div>
    </div>

    <div class="video-wrapper" id="v-remote-cont">
        <video id="remote-video" autoplay playsinline></video>
    </div>
    <div class="local-preview" id="v-local-cont">
        <video id="local-video" autoplay playsinline muted></video>
    </div>

    <div class="ui-layer">
        <div class="header-info" id="info-block">
            <div class="avatar-box ringing" id="avatar-anim">
                <div class="pulse-ring"></div>
                <div class="pulse-ring" style="animation-delay: 0.5s"></div>
                <div class="main-avatar" id="display-avatar">?</div>
            </div>
            <h1 class="caller-name" id="display-name">Загрузка...</h1>
            <p class="status-text" id="display-status">Инициализация...</p>
        </div>

        <div class="controls-grid">
            <div class="control-item" id="btn-mic">
                <div class="circle-btn" id="mic-bg">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                </div>
                <span class="btn-desc">Звук</span>
            </div>

            <div class="control-item" id="btn-video">
                <div class="circle-btn" id="video-bg">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </div>
                <span class="btn-desc">Камера</span>
            </div>

            <div class="control-item">
                <div class="circle-btn">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
                <span class="btn-desc">Инфо</span>
            </div>

            <div class="control-item hidden" id="answer-box">
                <div class="circle-btn green">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <span class="btn-desc">Ответить</span>
            </div>

            <div class="control-item" id="hangup-box">
                <div class="circle-btn red">
                    <svg viewBox="0 0 24 24" style="transform: rotate(135deg);"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <span class="btn-desc" id="hangup-text">Сбросить</span>
            </div>
        </div>
    </div>

    <audio id="snd-ring" src="https://assets.mixkit.co/active_storage/sfx/1359/1359-preview.mp3" loop></audio>
    <audio id="snd-dial" src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3" loop></audio>

    <script src="call_logic.js"></script>
</body>
</html>
