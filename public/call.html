<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Call — Связь нового поколения</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f18;
            --bg-panel: #1a1a2e;
            --accent: #7a5cff;
            --accent-glow: rgba(122, 92, 255, 0.5);
            --danger: #ff4b4b;
            --success: #33d176;
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --glass: rgba(26, 26, 46, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg-dark); color: var(--text); height: 100vh; overflow: hidden; }

        /* Контейнер видео потоков */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            height: calc(100vh - 100px);
            transition: all 0.5s ease;
        }

        .video-card {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
            border: 2px solid transparent;
        }

        .video-card.active-speaker { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        video { width: 100%; height: 100%; object-fit: cover; background: #111; }

        .user-label {
            position: absolute; bottom: 15px; left: 15px;
            background: rgba(0,0,0,0.6); padding: 5px 12px;
            border-radius: 10px; font-size: 14px; backdrop-filter: blur(5px);
            display: flex; align-items: center; gap: 8px;
        }

        /* Мое маленькое видео (Picture-in-Picture style) */
        #localVideoContainer {
            position: absolute; top: 20px; right: 20px;
            width: 240px; height: 135px; z-index: 100;
            cursor: move; transition: transform 0.2s;
        }

        /* Панель управления */
        .controls {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            border-radius: 40px;
            display: flex; gap: 20px;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .btn {
            width: 50px; height: 50px; border-radius: 50%;
            border: none; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255,255,255,0.1); color: white;
        }
        .btn svg { width: 24px; height: 24px; fill: currentColor; }
        .btn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
        .btn.active { background: var(--accent); }
        .btn.danger { background: var(--danger); }
        .btn.danger:hover { background: #ff2a2a; box-shadow: 0 0 20px rgba(255, 75, 75, 0.4); }

        /* Экраны состояний */
        .overlay {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(to bottom, #1a1a2e, #0f0f18);
            transition: opacity 0.5s;
        }

        .hidden { display: none !important; opacity: 0; pointer-events: none; }

        .caller-info { text-align: center; margin-bottom: 40px; }
        .caller-avatar {
            width: 120px; height: 120px; border-radius: 50%;
            background: var(--accent); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px; border: 4px solid var(--bg-panel);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .ring-actions { display: flex; gap: 40px; }
        .ring-btn {
            width: 70px; height: 70px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(122, 92, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(122, 92, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(122, 92, 255, 0); }
        }

        /* Уведомления */
        .toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 10px 25px;
            border-radius: 20px; z-index: 3000; font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="incomingOverlay" class="overlay hidden">
        <div class="caller-info">
            <div class="caller-avatar" id="incAvatar">?</div>
            <h2 id="incName">Алексей Смирнов</h2>
            <p id="incType">Входящий видеозвонок...</p>
        </div>
        <div class="ring-actions">
            <button class="ring-btn danger" onclick="rejectCall()">
                <svg viewBox="0 0 24 24" width="32"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="white" transform="rotate(135 12 12)"/></svg>
            </button>
            <button class="ring-btn" style="background: var(--success);" onclick="acceptCall()">
                <svg viewBox="0 0 24 24" width="32"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="white"/></svg>
            </button>
        </div>
    </div>

    <div id="callUI" class="hidden">
        <div class="video-grid" id="remoteVideos">
            </div>

        <div id="localVideoContainer" class="video-card">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="user-label">Вы (Вы)</div>
        </div>

        <div class="controls">
            <button class="btn" id="btnMic" onclick="toggleMic()" title="Микрофон">
                <svg id="iconMic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/></svg>
            </button>
            <button class="btn" id="btnCam" onclick="toggleCam()" title="Камера">
                <svg id="iconCam" viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </button>
            <button class="btn" id="btnScreen" onclick="toggleScreenShare()" title="Демонстрация экрана">
                <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
            </button>
            <button class="btn danger" onclick="endCall()" title="Завершить">
                <svg viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const socket = io();
        let localStream;
        let peerConnections = {}; // userId -> RTCPeerConnection
        let callData = JSON.parse(localStorage.getItem('craheapp_call') || '{}');
        let isScreenSharing = false;

        const iceConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                document.getElementById('localVideo').srcObject = localStream;
                
                if (callData.isIncoming) {
                    showIncomingUI();
                } else {
                    startCall();
                }
            } catch (err) {
                console.error("Медиа ошибка:", err);
                showToast("Ошибка доступа к камере/микрофону");
            }
        }

        // ========== ЛОГИКА ЗВОНКА ==========
        function startCall() {
            document.getElementById('callUI').classList.remove('hidden');
            socket.emit('call:init', { 
                targetId: callData.targetId,
                type: callData.type,
                senderName: JSON.parse(localStorage.getItem('craheapp_user')).name
            });
        }

        function showIncomingUI() {
            document.getElementById('incomingOverlay').classList.remove('hidden');
            document.getElementById('incName').innerText = callData.senderName;
        }

        function acceptCall() {
            document.getElementById('incomingOverlay').classList.add('hidden');
            document.getElementById('callUI').classList.remove('hidden');
            socket.emit('call:accept', { fromId: callData.senderId });
        }

        function rejectCall() {
            socket.emit('call:reject', { fromId: callData.senderId });
            window.close();
        }

        function endCall() {
            socket.emit('call:end', { targetId: callData.targetId });
            localStream.getTracks().forEach(t => t.stop());
            window.close();
        }

        // ========== WebRTC СИГНАЛИНГ ==========
        socket.on('offer', async ({ fromId, offer }) => {
            const pc = createPeerConnection(fromId);
            await pc.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', { toId: fromId, answer });
        });

        socket.on('answer', async ({ fromId, answer }) => {
            const pc = peerConnections[fromId];
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
        });

        socket.on('ice-candidate', async ({ fromId, candidate }) => {
            const pc = peerConnections[fromId];
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
        });

        function createPeerConnection(userId) {
            const pc = new RTCPeerConnection(iceConfig);
            peerConnections[userId] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) socket.emit('ice-candidate', { toId: userId, candidate: e.candidate });
            };

            pc.ontrack = (e) => {
                let remoteVid = document.getElementById(`vid_${userId}`);
                if (!remoteVid) {
                    const container = document.createElement('div');
                    container.className = 'video-card';
                    container.id = `card_${userId}`;
                    
                    remoteVid = document.createElement('video');
                    remoteVid.id = `vid_${userId}`;
                    remoteVid.autoplay = true;
                    remoteVid.playsinline = true;
                    
                    const label = document.createElement('div');
                    label.className = 'user-label';
                    label.innerText = 'Собеседник';
                    
                    container.appendChild(remoteVid);
                    container.appendChild(label);
                    document.getElementById('remoteVideos').appendChild(container);
                }
                remoteVid.srcObject = e.streams[0];
            };

            return pc;
        }

        // ========== УПРАВЛЕНИЕ МЕДИА ==========
        function toggleMic() {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            document.getElementById('btnMic').classList.toggle('active', !audioTrack.enabled);
        }

        function toggleCam() {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('btnCam').classList.toggle('active', !videoTrack.enabled);
        }

        async function toggleScreenShare() {
            if (!isScreenSharing) {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    const videoTrack = screenStream.getVideoTracks()[0];
                    
                    // Заменяем трек во всех PeerConnections
                    for (let id in peerConnections) {
                        const sender = peerConnections[id].getSenders().find(s => s.track.kind === 'video');
                        sender.replaceTrack(videoTrack);
                    }
                    
                    document.getElementById('localVideo').srcObject = screenStream;
                    isScreenSharing = true;
                    
                    videoTrack.onended = () => toggleScreenShare(); // Возврат при нажатии "Остановить" в браузере
                } catch (err) { console.error(err); }
            } else {
                const videoTrack = localStream.getVideoTracks()[0];
                for (let id in peerConnections) {
                    const sender = peerConnections[id].getSenders().find(s => s.track.kind === 'video');
                    sender.replaceTrack(videoTrack);
                }
                document.getElementById('localVideo').srcObject = localStream;
                isScreenSharing = false;
            }
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
