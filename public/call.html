<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Craheapp Call</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0f0f18;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: #fff;
        }
        .call-root {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Overlays */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 24, 0.96);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .incoming-card, .outgoing-card {
            background: #1a1a2e;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            border: 1px solid #7a5cff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .avatar-large {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin: 0 auto 20px;
        }
        .caller-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .call-status-text {
            font-size: 16px;
            color: #8b949e;
            margin-bottom: 32px;
        }
        .call-buttons {
            display: flex;
            gap: 24px;
            justify-content: center;
        }
        .call-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .call-btn:active { transform: scale(0.94); }
        .accept-btn { background: #00e676; color: white; animation: pulse 1.5s infinite; }
        .decline-btn { background: #ff5252; color: white; }
        .cancel-btn { background: #ff5252; width: 80px; border-radius: 40px; font-size: 18px; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,230,118,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,230,118,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,230,118,0); }
        }

        /* Active call container */
        .active-call-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #0f0f18;
        }
        .call-header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(26,26,46,0.8), transparent);
            z-index: 10;
        }
        .call-name-header {
            font-size: 20px;
            font-weight: 600;
        }
        .call-duration {
            font-size: 14px;
            color: #8b949e;
            font-family: monospace;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid #7a5cff;
            cursor: pointer;
            z-index: 20;
            background: #0f0f18;
        }
        .audio-only-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 72px;
        }
        .voice-wave {
            position: absolute;
            bottom: 30%;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
        }
        .wave {
            width: 4px;
            height: 20px;
            background: #7a5cff;
            border-radius: 2px;
            animation: wave 0.5s infinite ease alternate;
        }
        @keyframes wave {
            0% { height: 10px; }
            100% { height: 40px; }
        }

        /* Controls panel */
        .controls-panel {
            background: #1a1a2e;
            padding: 16px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-top: 1px solid #7a5cff;
            transition: opacity 0.3s;
        }
        .control-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #2a2a3a;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-icon:active { transform: scale(0.94); }
        .control-icon.active { background: #7a5cff; }
        .control-icon.danger { background: #ff5252; }
        .control-icon.inactive { opacity: 0.6; background: #3a3a4a; }
        .controls-panel.auto-hide {
            opacity: 0;
            pointer-events: none;
        }

        /* Group grid */
        .group-grid {
            display: grid;
            gap: 8px;
            padding: 8px;
            height: 100%;
            background: #0a0a12;
        }
        .grid-1 { grid-template-columns: 1fr; }
        .grid-2 { grid-template-columns: 1fr 1fr; }
        .grid-3, .grid-4 { grid-template-columns: repeat(2, 1fr); }
        .grid-5, .grid-6, .grid-7, .grid-8, .grid-9 { grid-template-columns: repeat(3, 1fr); }
        .grid-item {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
        }
        .grid-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .grid-avatar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #7a5cff, #ff5ad6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .speaker-glow {
            box-shadow: 0 0 0 2px #7a5cff, 0 0 0 5px rgba(122,92,255,0.4);
        }

        /* Floating window */
        .floating-call {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 280px;
            background: #1a1a2e;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: grab;
            border: 1px solid #7a5cff;
        }
        .floating-video {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #000;
        }
        .floating-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(4px);
        }
        .floating-name { font-size: 14px; font-weight: 500; }
        .floating-timer { font-size: 12px; font-family: monospace; }
        .floating-controls { display: flex; gap: 12px; }
        .floating-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .floating-btn:active { background: rgba(255,255,255,0.2); }

        /* Settings panel */
        .settings-panel {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 280px;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 16px;
            z-index: 200;
            border: 1px solid #7a5cff;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .settings-panel.open { display: flex; }
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select {
            background: #2a2a3a;
            border: 1px solid #7a5cff;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
        }

        /* Toast */
        .notification-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff5252;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .call-ended-screen {
            position: fixed;
            inset: 0;
            background: #0f0f18;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }
        @media (max-width: 768px) {
            .control-icon { width: 48px; height: 48px; font-size: 20px; }
            .local-video { width: 120px; height: 80px; }
            .floating-call { width: 240px; }
        }
    </style>
</head>
<body>
<div id="callRoot" class="call-root"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
    // ========== GLOBALS ==========
    let socket = null;
    let currentUser = null;
    let callData = null;
    let callState = 'idle'; // idle, calling, ringing, connecting, active, ended
    let peerConnection = null;
    let localStream = null;
    let remoteStream = null;
    let screenShareStream = null;
    let isScreenSharing = false;
    let callTimerInterval = null;
    let callStartTime = 0;
    let isMuted = false;
    let isVideoOff = false;
    let usingFrontCamera = true;
    let floatingWindow = null;
    let controlsAutoHideTimeout = null;
    let groupPeers = new Map(); // userId -> { pc, stream, videoElement }
    let groupParticipants = [];
    let ringtone = null;

    // DOM elements (will be set after render)
    let remoteVideoEl = null, localVideoEl = null, durationSpan = null;

    // ========== HELPERS ==========
    function showNotification(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.style.background = isError ? '#ff5252' : '#7a5cff';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    function formatDuration(sec) {
        const mins = Math.floor(sec / 60);
        const s = sec % 60;
        return `${mins.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    function updateCallTimer() {
        if (callState !== 'active') return;
        const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
        if (durationSpan) durationSpan.innerText = formatDuration(elapsed);
        if (floatingWindow) {
            const ft = floatingWindow.querySelector('.floating-timer');
            if (ft) ft.innerText = formatDuration(elapsed);
        }
    }
    function startTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callStartTime = Date.now();
        callTimerInterval = setInterval(updateCallTimer, 1000);
    }
    function stopTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = null;
    }
    function playRingtone() {
        if (ringtone) ringtone.pause();
        ringtone = new Audio('data:audio/wav;base64,U3RlcmVv'); // dummy, real ringtone would be loaded
        ringtone.loop = true;
        ringtone.play().catch(e => console.warn);
    }
    function stopRingtone() {
        if (ringtone) { ringtone.pause(); ringtone = null; }
    }
    function vibrate() { if (navigator.vibrate) navigator.vibrate(200); }

    // ========== MEDIA ==========
    async function initLocalStream(isVideo) {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        const constraints = {
            audio: true,
            video: isVideo ? { width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30 } } : false
        };
        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            localStream = stream;
            return stream;
        } catch (err) {
            showNotification('Нет доступа к микрофону/камере', true);
            throw err;
        }
    }

    // ========== WEBRTC 1-1 ==========
    async function createPeerConnection(targetId, isVideo) {
        const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        if (localStream) {
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
        }
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit('call:signal', { targetId, candidate: event.candidate });
            }
        };
        pc.ontrack = (event) => {
            remoteStream = event.streams[0];
            if (remoteVideoEl) remoteVideoEl.srcObject = remoteStream;
            if (!isVideo && document.querySelector('.audio-only-avatar')) {
                document.querySelector('.audio-only-avatar').style.display = 'flex';
            }
            if (callState === 'connecting') {
                callState = 'active';
                startTimer();
            }
        };
        return pc;
    }

    async function startCall(targetId, isVideo) {
        try {
            await initLocalStream(isVideo);
            peerConnection = await createPeerConnection(targetId, isVideo);
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('call:signal', { targetId, offer });
            callState = 'calling';
        } catch (err) {
            endCall();
        }
    }

    async function handleOffer(data) {
        if (!peerConnection) {
            await initLocalStream(callData?.isVideo || false);
            peerConnection = await createPeerConnection(data.from, callData?.isVideo || false);
        }
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.emit('call:signal', { targetId: data.from, answer });
        callState = 'connecting';
    }

    async function handleAnswer(data) {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            callState = 'active';
            startTimer();
        }
    }

    async function handleIceCandidate(data) {
        if (peerConnection) {
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            } catch(e) { console.warn(e); }
        }
    }

    // ========== SCREEN SHARE ==========
    async function toggleScreenShare() {
        if (!localStream) return;
        if (isScreenSharing) {
            // stop screen share, restore camera
            if (screenShareStream) screenShareStream.getTracks().forEach(t => t.stop());
            screenShareStream = null;
            const newStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const oldVideoTrack = localStream.getVideoTracks()[0];
            const newVideoTrack = newStream.getVideoTracks()[0];
            localStream.removeTrack(oldVideoTrack);
            localStream.addTrack(newVideoTrack);
            if (peerConnection) {
                const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(newVideoTrack);
            }
            if (localVideoEl) localVideoEl.srcObject = localStream;
            isScreenSharing = false;
            document.querySelector('#screenShareBtn')?.classList.remove('active');
        } else {
            try {
                screenShareStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenShareStream.getVideoTracks()[0];
                const oldVideoTrack = localStream.getVideoTracks()[0];
                localStream.removeTrack(oldVideoTrack);
                localStream.addTrack(videoTrack);
                if (peerConnection) {
                    const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
                if (localVideoEl) localVideoEl.srcObject = localStream;
                isScreenSharing = true;
                document.querySelector('#screenShareBtn')?.classList.add('active');
                videoTrack.onended = () => toggleScreenShare();
            } catch (err) {
                showNotification('Демонстрация экрана отменена');
            }
        }
    }

    // ========== UI CONTROLS ==========
    function toggleMute() {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
        const btn = document.querySelector('#micBtn');
        if (btn) {
            if (isMuted) btn.classList.add('inactive');
            else btn.classList.remove('inactive');
        }
        if (floatingWindow) {
            const fm = floatingWindow.querySelector('#floatMute');
            if (fm) fm.style.opacity = isMuted ? '0.5' : '1';
        }
        if (callData?.type === 'personal' && currentCall?.targetId) {
            socket.emit('call:mute', { targetId: currentCall.targetId, muted: isMuted });
        }
    }

    function toggleVideo() {
        if (!localStream || !callData?.isVideo) return;
        isVideoOff = !isVideoOff;
        localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
        const btn = document.querySelector('#camBtn');
        if (btn) {
            if (isVideoOff) btn.classList.add('inactive');
            else btn.classList.remove('inactive');
        }
        if (isVideoOff) {
            if (localVideoEl) localVideoEl.style.display = 'none';
            const avatar = document.querySelector('.audio-only-avatar');
            if (avatar) avatar.style.display = 'flex';
        } else {
            if (localVideoEl) localVideoEl.style.display = 'block';
            const avatar = document.querySelector('.audio-only-avatar');
            if (avatar) avatar.style.display = 'none';
        }
        if (callData?.type === 'personal' && currentCall?.targetId) {
            socket.emit('call:video', { targetId: currentCall.targetId, enabled: !isVideoOff });
        }
    }

    async function switchCamera() {
        if (!localStream || !callData?.isVideo) return;
        const newStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: usingFrontCamera ? 'environment' : 'user' },
            audio: true
        });
        const newVideoTrack = newStream.getVideoTracks()[0];
        const oldVideoTrack = localStream.getVideoTracks()[0];
        localStream.removeTrack(oldVideoTrack);
        localStream.addTrack(newVideoTrack);
        oldVideoTrack.stop();
        if (peerConnection) {
            const sender = peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
            if (sender) sender.replaceTrack(newVideoTrack);
        }
        if (localVideoEl) localVideoEl.srcObject = localStream;
        usingFrontCamera = !usingFrontCamera;
    }

    function toggleSpeaker() {
        if (remoteVideoEl && remoteVideoEl.setSinkId) {
            // could select output device, simplified
        }
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    function minimizeCall() {
        if (callState !== 'active') return;
        createFloatingWindow();
        const container = document.querySelector('.active-call-container');
        if (container) container.style.display = 'none';
        callState = 'minimized';
    }

    function createFloatingWindow() {
        if (floatingWindow) floatingWindow.remove();
        floatingWindow = document.createElement('div');
        floatingWindow.className = 'floating-call';
        floatingWindow.innerHTML = `
            <video id="floatingRemote" class="floating-video" autoplay playsinline></video>
            <div class="floating-info">
                <span class="floating-name">${callData?.targetName || 'Звонок'}</span>
                <span class="floating-timer">00:00</span>
                <div class="floating-controls">
                    <button class="floating-btn" id="floatMute">🎤</button>
                    <button class="floating-btn" id="floatEnd">📞</button>
                    <button class="floating-btn" id="floatExpand">🗖</button>
                </div>
            </div>
        `;
        document.body.appendChild(floatingWindow);
        const floatVideo = floatingWindow.querySelector('#floatingRemote');
        if (remoteVideoEl && remoteVideoEl.srcObject) floatVideo.srcObject = remoteVideoEl.srcObject;
        let isDragging = false, startX, startY, startLeft, startTop;
        floatingWindow.addEventListener('mousedown', (e) => {
            if (e.target.closest('.floating-controls')) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const rect = floatingWindow.getBoundingClientRect();
            startLeft = rect.left;
            startTop = rect.top;
            floatingWindow.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            floatingWindow.style.left = (startLeft + dx) + 'px';
            floatingWindow.style.top = (startTop + dy) + 'px';
            floatingWindow.style.right = 'auto';
            floatingWindow.style.bottom = 'auto';
        });
        window.addEventListener('mouseup', () => {
            isDragging = false;
            floatingWindow.style.cursor = 'grab';
        });
        floatingWindow.querySelector('#floatMute').onclick = toggleMute;
        floatingWindow.querySelector('#floatEnd').onclick = () => endCall();
        floatingWindow.querySelector('#floatExpand').onclick = () => {
            floatingWindow.remove();
            floatingWindow = null;
            const container = document.querySelector('.active-call-container');
            if (container) container.style.display = 'flex';
            callState = 'active';
        };
    }

    function expandCall() {
        if (floatingWindow) {
            floatingWindow.querySelector('#floatExpand').click();
        }
    }

    function endCall() {
        stopRingtone();
        if (peerConnection) peerConnection.close();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (screenShareStream) screenShareStream.getTracks().forEach(t => t.stop());
        for (let p of groupPeers.values()) p.pc.close();
        groupPeers.clear();
        if (floatingWindow) floatingWindow.remove();
        floatingWindow = null;
        stopTimer();
        if (callData?.type === 'personal' && currentCall?.targetId) {
            socket.emit('call:end', { targetId: currentCall.targetId });
        }
        const duration = callStartTime ? formatDuration(Math.floor((Date.now() - callStartTime)/1000)) : '00:00';
        document.getElementById('callRoot').innerHTML = `
            <div class="call-ended-screen">
                <div style="background:#1a1a2e; border-radius:40px; padding:40px; text-align:center;">
                    <div style="font-size:64px;">📞</div>
                    <div style="font-size:28px; font-weight:600;">Звонок завершён</div>
                    <div style="margin:20px 0; color:#8b949e;">Длительность: ${duration}</div>
                    <button id="closeEnd" style="background:#7a5cff; border:none; padding:12px 32px; border-radius:40px; color:white;">Закрыть</button>
                </div>
            </div>
        `;
        document.getElementById('closeEnd').onclick = () => window.close();
        callState = 'ended';
    }

    function showActiveUI() {
        const isVideo = callData?.isVideo;
        const root = document.getElementById('callRoot');
        root.innerHTML = `
            <div class="active-call-container">
                <div class="call-header">
                    <div class="call-name-header">${escapeHtml(callData.targetName)}</div>
                    <div class="call-duration">00:00</div>
                </div>
                <div class="video-wrapper">
                    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
                    <div id="audioAvatar" class="audio-only-avatar" style="display: none;"></div>
                    <div id="voiceWaves" class="voice-wave" style="display: none;"></div>
                </div>
                <div class="controls-panel" id="controlsPanel">
                    <button class="control-icon" id="micBtn">🎤</button>
                    <button class="control-icon" id="camBtn">📹</button>
                    <button class="control-icon danger" id="endCallBtn">📞</button>
                    <button class="control-icon" id="speakerBtn">🔊</button>
                    <button class="control-icon" id="switchCamBtn">🔄</button>
                    <button class="control-icon" id="screenShareBtn">🖥️</button>
                    <button class="control-icon" id="fullscreenBtn">⤢</button>
                    <button class="control-icon" id="minimizeBtn">🗗</button>
                    <button class="control-icon" id="settingsBtn">⚙️</button>
                </div>
            </div>
        `;
        remoteVideoEl = document.getElementById('remoteVideo');
        localVideoEl = document.getElementById('localVideo');
        durationSpan = document.querySelector('.call-duration');
        if (!isVideo) {
            const avatar = document.getElementById('audioAvatar');
            avatar.style.display = 'flex';
            avatar.innerText = callData.targetName[0].toUpperCase();
            const waves = document.getElementById('voiceWaves');
            for (let i=0;i<5;i++) {
                const w = document.createElement('div');
                w.className = 'wave';
                waves.appendChild(w);
            }
            waves.style.display = 'flex';
            localVideoEl.style.display = 'none';
        }
        // bind buttons
        document.getElementById('micBtn').onclick = toggleMute;
        document.getElementById('camBtn').onclick = toggleVideo;
        document.getElementById('endCallBtn').onclick = endCall;
        document.getElementById('speakerBtn').onclick = toggleSpeaker;
        document.getElementById('switchCamBtn').onclick = switchCamera;
        document.getElementById('screenShareBtn').onclick = toggleScreenShare;
        document.getElementById('fullscreenBtn').onclick = toggleFullscreen;
        document.getElementById('minimizeBtn').onclick = minimizeCall;
        document.getElementById('settingsBtn').onclick = () => toggleSettings();

        // auto-hide controls
        const panel = document.querySelector('.controls-panel');
        function resetAutoHide() {
            if (controlsAutoHideTimeout) clearTimeout(controlsAutoHideTimeout);
            panel.classList.remove('auto-hide');
            controlsAutoHideTimeout = setTimeout(() => {
                if (callState === 'active') panel.classList.add('auto-hide');
            }, 3000);
        }
        panel.addEventListener('mousemove', resetAutoHide);
        resetAutoHide();
    }

    function toggleSettings() {
        let panel = document.getElementById('settingsPanel');
        if (!panel) {
            panel = document.createElement('div');
            panel.id = 'settingsPanel';
            panel.className = 'settings-panel';
            panel.innerHTML = `
                <div class="setting-row"><span>Микрофон</span><select id="audioInSelect"></select></div>
                <div class="setting-row"><span>Камера</span><select id="videoInSelect"></select></div>
                <div class="setting-row"><span>Динамики</span><select id="audioOutSelect"></select></div>
            `;
            document.body.appendChild(panel);
            loadDevices();
        }
        panel.classList.toggle('open');
    }
    async function loadDevices() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const audioIn = devices.filter(d => d.kind === 'audioinput');
        const videoIn = devices.filter(d => d.kind === 'videoinput');
        const audioOut = devices.filter(d => d.kind === 'audiooutput');
        const audioSelect = document.getElementById('audioInSelect');
        const videoSelect = document.getElementById('videoInSelect');
        const outSelect = document.getElementById('audioOutSelect');
        if (audioSelect) audioSelect.innerHTML = audioIn.map(d => `<option value="${d.deviceId}">${d.label || 'Микрофон'}</option>`).join('');
        if (videoSelect) videoSelect.innerHTML = videoIn.map(d => `<option value="${d.deviceId}">${d.label || 'Камера'}</option>`).join('');
        if (outSelect) outSelect.innerHTML = audioOut.map(d => `<option value="${d.deviceId}">${d.label || 'Динамики'}</option>`).join('');
    }

    function showIncomingScreen(callerName, isVideo) {
        const overlay = document.createElement('div');
        overlay.className = 'call-overlay';
        overlay.innerHTML = `
            <div class="incoming-card">
                <div class="avatar-large">${callerName[0].toUpperCase()}</div>
                <div class="caller-name">${escapeHtml(callerName)}</div>
                <div class="call-status-text">${isVideo ? 'Видеозвонок' : 'Аудиозвонок'}</div>
                <div class="call-buttons">
                    <button class="call-btn accept-btn" id="acceptCallBtn">📞</button>
                    <button class="call-btn decline-btn" id="declineCallBtn">✖</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        vibrate();
        playRingtone();
        document.getElementById('acceptCallBtn').onclick = () => {
            overlay.remove();
            stopRingtone();
            callState = 'connecting';
            socket.emit('call:accept', { fromId: callData.targetId });
            showActiveUI();
            initLocalStream(callData.isVideo).then(() => {
                // peer will be created after offer arrives
            }).catch(() => endCall());
        };
        document.getElementById('declineCallBtn').onclick = () => {
            overlay.remove();
            stopRingtone();
            socket.emit('call:reject', { fromId: callData.targetId });
            window.close();
        };
    }

    function showOutgoingScreen(targetName, isVideo) {
        const overlay = document.createElement('div');
        overlay.className = 'call-overlay';
        overlay.innerHTML = `
            <div class="outgoing-card">
                <div class="avatar-large">${targetName[0].toUpperCase()}</div>
                <div class="caller-name">${escapeHtml(targetName)}</div>
                <div class="call-status-text" id="outgoingStatus">Вызов...</div>
                <div class="call-buttons">
                    <button class="call-btn cancel-btn" id="cancelCallBtn">Отменить</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        let dots = 0;
        const statusEl = document.getElementById('outgoingStatus');
        const interval = setInterval(() => {
            if (callState !== 'calling') { clearInterval(interval); return; }
            dots = (dots % 3) + 1;
            statusEl.innerText = 'Вызов' + '.'.repeat(dots);
        }, 500);
        document.getElementById('cancelCallBtn').onclick = () => {
            clearInterval(interval);
            overlay.remove();
            endCall();
        };
        setTimeout(() => {
            if (callState === 'calling') {
                clearInterval(interval);
                overlay.remove();
                endCall();
                showNotification('Нет ответа', true);
            }
        }, 30000);
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])); }

    // ========== LOAD CALL DATA ==========
    function loadCallData() {
        const data = localStorage.getItem('craheapp_call');
        if (!data) {
            alert('Нет данных о звонке');
            window.close();
            return;
        }
        callData = JSON.parse(data);
        localStorage.removeItem('craheapp_call');
        currentUser = { id: callData.myUserId, name: callData.myUsername };
        if (callData.type === 'personal') {
            if (callData.isIncoming) {
                // show incoming screen
                showIncomingScreen(callData.targetName, callData.isVideo);
            } else {
                // start outgoing
                showOutgoingScreen(callData.targetName, callData.isVideo);
                startCall(callData.targetId, callData.isVideo);
            }
        } else {
            // group call – not implemented in this simplified version, but server will handle
            showNotification('Групповые звонки в разработке', true);
            window.close();
        }
    }

    // ========== SOCKET ==========
    function setupSocket() {
        socket = io({ transports: ['websocket', 'polling'] });
        socket.on('connect', () => {
            socket.emit('register', { userId: currentUser.id, username: currentUser.name });
        });
        socket.on('call:accepted', () => {
            if (callState === 'calling') {
                callState = 'connecting';
                // wait for offer from remote
            }
        });
        socket.on('call:rejected', () => {
            if (callState === 'calling') {
                endCall();
                showNotification('Звонок отклонён', true);
            }
        });
        socket.on('call:ended', () => {
            endCall();
            showNotification('Звонок завершён');
        });
        socket.on('offer', async (data) => {
            if (callState === 'ringing' || callState === 'connecting') {
                await handleOffer(data);
            }
        });
        socket.on('answer', async (data) => {
            await handleAnswer(data);
        });
        socket.on('ice-candidate', async (data) => {
            await handleIceCandidate(data);
        });
        socket.on('call:mute', (data) => {
            // remote mute indicator could be shown
        });
        socket.on('call:video', (data) => {
            // remote video toggle
        });
        socket.on('call:error', (data) => {
            showNotification(data.message, true);
            endCall();
        });
    }

    // ========== INIT ==========
    function init() {
        loadCallData();
        setupSocket();
    }
    init();
</script>
</body>
</html>
