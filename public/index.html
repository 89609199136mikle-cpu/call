<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TelegramCall – Бесплатные видеозвонки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f1a;
            color: #e6edf3;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== АВТОРИЗАЦИЯ ========== */
        .auth-container {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .auth-card {
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 1px solid rgba(46, 166, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
        }
        .auth-card h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .auth-sub {
            color: #8b949e;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a2e;
            border: 1px solid #2ea6ff;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
            transition: 0.2s;
        }
        .auth-input:focus {
            border-color: #0088cc;
            box-shadow: 0 0 0 2px rgba(46,166,255,0.2);
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border: none;
            border-radius: 16px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .auth-btn:active { transform: scale(0.98); }

        /* ========== ОСНОВНОЙ ИНТЕРФЕЙС ========== */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #0f0f1a;
        }
        .telegram-header {
            background: #1a1a2e;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2ea6ff;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 18px;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }
        .mobile-menu-btn {
            display: none;
            background: #2ea6ff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            color: white;
        }

        /* Сетка */
        .main-grid {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .contacts-sidebar {
            width: 300px;
            background: #0f0f1a;
            border-right: 1px solid #2ea6ff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .contacts-header {
            padding: 16px;
            border-bottom: 1px solid #2ea6ff;
            font-weight: 600;
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }
        .contact-item:active { background: #1a1a2e; }
        .contact-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .contact-info {
            flex: 1;
            min-width: 0;
        }
        .contact-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .contact-status {
            font-size: 11px;
            color: #2ea6ff;
        }
        .call-buttons {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .call-icon {
            background: #2ea6ff;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: white;
        }
        .call-icon:active { transform: scale(0.94); }

        /* Область звонка */
        .call-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
            overflow: hidden;
        }
        .call-header {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #2ea6ff;
        }
        .call-header h2 { font-size: 18px; margin-bottom: 4px; }
        .call-status-text { font-size: 12px; color: #8b949e; }

        /* Видео */
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
            min-height: 0;
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #2ea6ff;
            cursor: pointer;
            z-index: 10;
        }
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 16px;
            background: #1a1a2e;
            flex-shrink: 0;
        }
        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.1s;
            background: #2ea6ff;
            color: white;
        }
        .control-btn:active { transform: scale(0.94); }
        .control-btn.end-call { background: #dc2626; }
        .control-btn.inactive { opacity: 0.5; background: #4a4a6a; }

        /* Экран ожидания / статуса */
        .call-status-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .call-status-icon { font-size: 64px; margin-bottom: 20px; }
        .call-timer { font-size: 24px; font-weight: 600; margin: 10px 0; }

        /* Входящий звонок */
        .incoming-call {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border: 1px solid #2ea6ff;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(12px);
            z-index: 200;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .incoming-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .incoming-info { flex: 1; }
        .incoming-name { font-weight: 600; }
        .incoming-type { font-size: 12px; color: #2ea6ff; }
        .incoming-actions { display: flex; gap: 12px; }
        .incoming-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .incoming-accept { background: #22c55e; color: white; }
        .incoming-reject { background: #dc2626; color: white; }

        /* Уведомления */
        .notification {
            position: fixed;
            top: 70px;
            left: 20px;
            right: 20px;
            background: #1a1a2e;
            border-left: 4px solid #2ea6ff;
            border-radius: 16px;
            padding: 12px 16px;
            text-align: center;
            font-size: 14px;
            z-index: 1000;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .contacts-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100%;
                z-index: 400;
                transform: translateX(-100%);
                border-right: none;
                box-shadow: 2px 0 12px rgba(0,0,0,0.5);
            }
            .contacts-sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
            .logo span { display: none; }
            .user-name { display: none; }
            .local-video { width: 90px; height: 68px; bottom: 12px; right: 12px; }
            .control-btn { width: 48px; height: 48px; font-size: 20px; }
            .call-icon { width: 32px; height: 32px; font-size: 16px; }
        }
        @media (max-width: 480px) {
            .local-video { width: 70px; height: 52px; }
            .control-btn { width: 44px; height: 44px; font-size: 18px; }
        }

        .hidden { display: none; }
        .debug-info {
            position: fixed;
            bottom: 4px;
            left: 4px;
            font-size: 9px;
            color: #666;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="authContainer" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">📞</div>
        <h1>TelegramCall</h1>
        <div class="auth-sub">Бесплатные видеозвонки</div>
        <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя" autocomplete="off">
        <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID" autocomplete="off">
        <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
        <div class="auth-sub" style="margin-top: 16px; font-size: 11px;">Скажите свой ID собеседнику</div>
    </div>
</div>

<div id="appContainer" class="app-container hidden">
    <div class="telegram-header">
        <button class="mobile-menu-btn" id="menuBtn">☰</button>
        <div class="logo">
            <div class="logo-icon">📞</div>
            <span>TelegramCall</span>
        </div>
        <div class="user-info">
            <span class="user-name" id="currentUserName"></span>
            <div class="avatar" id="userAvatar"></div>
        </div>
    </div>
    <div class="main-grid">
        <div class="contacts-sidebar" id="contactsSidebar">
            <div class="contacts-header">
                Контакты онлайн
                <button id="closeMenuBtn" style="float: right; background: none; border: none; color: #8b949e; font-size: 20px; cursor: pointer; display: none;">✕</button>
            </div>
            <div class="contacts-list" id="contactsList"></div>
        </div>
        <div class="call-area" id="callArea">
            <div class="call-header">
                <h2 id="callWithName">Готов к звонкам</h2>
                <div class="call-status-text" id="callStatusText"></div>
            </div>
            <div id="callContent">
                <div class="call-status-screen">
                    <div class="call-status-icon">📞</div>
                    <div class="call-status-message">Выберите контакт</div>
                    <div class="call-status-sub">Нажмите на звонок рядом с контактом</div>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="contactsOverlay" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:399;"></div>
<div id="debugInfo" class="debug-info"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let peerConnection = null;
    let localStream = null;
    let currentCall = null;
    let callTimerInterval = null;
    let callStartTime = 0;

    // DOM
    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const registerBtn = document.getElementById('registerBtn');
    const contactsList = document.getElementById('contactsList');
    const contactsSidebar = document.getElementById('contactsSidebar');
    const contactsOverlay = document.getElementById('contactsOverlay');
    const menuBtn = document.getElementById('menuBtn');
    const closeMenuBtn = document.getElementById('closeMenuBtn');
    const debugInfoDiv = document.getElementById('debugInfo');

    function debugLog(msg) {
        console.log(msg);
        debugInfoDiv.textContent = msg;
        setTimeout(() => { if (debugInfoDiv.textContent === msg) debugInfoDiv.textContent = ''; }, 3000);
    }

    function showNotification(msg, isError = false) {
        const n = document.createElement('div');
        n.className = 'notification';
        n.style.borderLeftColor = isError ? '#dc2626' : '#2ea6ff';
        n.textContent = msg;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 3000);
    }

    function closeMobileMenu() {
        contactsSidebar.classList.remove('open');
        contactsOverlay.classList.add('hidden');
    }
    function openMobileMenu() {
        if (window.innerWidth <= 768) {
            contactsSidebar.classList.add('open');
            contactsOverlay.classList.remove('hidden');
        }
    }
    menuBtn?.addEventListener('click', openMobileMenu);
    if (closeMenuBtn) closeMenuBtn.addEventListener('click', closeMobileMenu);
    contactsOverlay.addEventListener('click', closeMobileMenu);
    window.addEventListener('resize', () => { if (window.innerWidth > 768) closeMobileMenu(); });

    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const userId = document.getElementById('regUserId').value.trim();
        if (!username || !userId) return showNotification('Заполните все поля', true);
        currentUser = { username, userId };
        const resp = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, userId })
        });
        if (resp.ok) {
            socket = io({ transports: ['websocket', 'polling'] });
            socket.on('connect', () => {
                debugLog('✅ WebSocket connected');
                socket.emit('register', { username, userId });
            });
            setupSocketListeners();
            authContainer.classList.add('hidden');
            appContainer.classList.remove('hidden');
            document.getElementById('currentUserName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
        } else showNotification('Ошибка регистрации', true);
    });

    function setupSocketListeners() {
        socket.on('user-list', (users) => renderContacts(users.filter(u => u.userId !== currentUser.userId)));
        socket.on('incoming-call', (data) => {
            debugLog(`📞 Incoming from ${data.fromName}`);
            showIncomingCall(data);
        });
        socket.on('call-accepted', async (data) => {
            debugLog(`✅ Call accepted by ${data.targetName}`);
            document.getElementById('callStatusText').innerHTML = 'Соединение...';
            await startCall(data.targetId, currentCall?.callType);
        });
        socket.on('call-rejected', () => {
            endCall(); showNotification('Звонок отклонён');
        });
        socket.on('call-error', (data) => {
            endCall(); showNotification(data.message, true);
        });
        socket.on('call-ended', () => {
            endCall(); showNotification('Звонок завершён');
        });
        socket.on('offer', async (data) => {
            debugLog(`📡 Offer from ${data.from}`);
            await handleOffer(data);
        });
        socket.on('answer', async (data) => {
            debugLog(`📡 Answer from ${data.from}`);
            await handleAnswer(data);
        });
        socket.on('ice-candidate', async (data) => {
            if (peerConnection) {
                try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); }
                catch(e) { console.error('ICE error', e); }
            }
        });
    }

    async function startCall(targetId, callType) {
        try {
            debugLog(`🎥 Starting ${callType} call to ${targetId}`);
            localStream = await navigator.mediaDevices.getUserMedia({
                video: callType === 'video',
                audio: true
            });
            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(config);
            localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
            peerConnection.onicecandidate = e => {
                if (e.candidate) socket.emit('ice-candidate', { targetId, candidate: e.candidate });
            };
            peerConnection.oniceconnectionstatechange = () => {
                debugLog(`🔌 ICE state: ${peerConnection.iceConnectionState}`);
                if (peerConnection.iceConnectionState === 'connected') document.getElementById('callStatusText').innerHTML = 'Соединено';
                else if (peerConnection.iceConnectionState === 'failed') showNotification('Соединение не удалось', true);
            };
            peerConnection.ontrack = e => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && e.streams[0]) remoteVideo.srcObject = e.streams[0];
            };
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', { targetId, offer });
            showCallUI(callType);
            startTimer();
        } catch (err) {
            debugLog(`❌ Start call error: ${err.message}`);
            showNotification('Не удалось начать звонок', true);
            endCall();
        }
    }

    async function handleOffer(data) {
        try {
            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };
            if (!peerConnection) {
                peerConnection = new RTCPeerConnection(config);
                if (localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.onicecandidate = e => {
                    if (e.candidate) socket.emit('ice-candidate', { targetId: data.from, candidate: e.candidate });
                };
                peerConnection.ontrack = e => {
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && e.streams[0]) remoteVideo.srcObject = e.streams[0];
                };
            }
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', { targetId: data.from, answer });
            startTimer();
        } catch (err) { debugLog(`Offer error: ${err.message}`); }
    }

    async function handleAnswer(data) {
        if (peerConnection) await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
    }

    function showCallUI(callType) {
        const callContent = document.getElementById('callContent');
        if (callType === 'video') {
            callContent.innerHTML = `
                <div class="video-container">
                    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
                </div>
                <div class="call-controls">
                    <button class="control-btn" id="toggleMuteBtn">🎤</button>
                    <button class="control-btn" id="toggleVideoBtn">📹</button>
                    <button class="control-btn" id="switchCameraBtn" style="background:#4a4a6a;">🔄</button>
                    <button class="control-btn end-call" id="endCallBtn">📞</button>
                </div>
            `;
            if (localStream) document.getElementById('localVideo').srcObject = localStream;
            let muted = false, videoOff = false;
            let usingFront = true;
            document.getElementById('toggleMuteBtn').onclick = () => {
                if (localStream) {
                    muted = !muted;
                    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
                    document.getElementById('toggleMuteBtn').style.opacity = muted ? '0.5' : '1';
                }
            };
            document.getElementById('toggleVideoBtn').onclick = () => {
                if (localStream) {
                    videoOff = !videoOff;
                    localStream.getVideoTracks().forEach(t => t.enabled = !videoOff);
                    document.getElementById('toggleVideoBtn').style.opacity = videoOff ? '0.5' : '1';
                }
            };
            document.getElementById('switchCameraBtn').onclick = async () => {
                if (!localStream) return;
                const videoTrack = localStream.getVideoTracks()[0];
                if (!videoTrack) return;
                const newStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: usingFront ? 'environment' : 'user' }, audio: true });
                const newVideoTrack = newStream.getVideoTracks()[0];
                const oldVideoTrack = videoTrack;
                localStream.removeTrack(oldVideoTrack);
                localStream.addTrack(newVideoTrack);
                oldVideoTrack.stop();
                const senders = peerConnection.getSenders();
                const sender = senders.find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(newVideoTrack);
                document.getElementById('localVideo').srcObject = localStream;
                usingFront = !usingFront;
            };
        } else {
            callContent.innerHTML = `
                <div class="call-status-screen">
                    <div class="call-status-icon">🎙️</div>
                    <div class="call-status-message">Аудиозвонок</div>
                    <div class="call-timer" id="callTimer">00:00</div>
                </div>
                <div class="call-controls">
                    <button class="control-btn" id="toggleMuteBtn">🎤</button>
                    <button class="control-btn end-call" id="endCallBtn">📞</button>
                </div>
            `;
            let muted = false;
            document.getElementById('toggleMuteBtn').onclick = () => {
                if (localStream) {
                    muted = !muted;
                    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
                    document.getElementById('toggleMuteBtn').style.opacity = muted ? '0.5' : '1';
                }
            };
        }
        document.getElementById('endCallBtn').onclick = () => {
            endCall();
            if (currentCall) socket.emit('end-call', { targetId: currentCall.targetId });
        };
    }

    function startTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callStartTime = Date.now();
        callTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            const timerElem = document.getElementById('callTimer');
            if (timerElem) timerElem.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function stopTimer() {
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = null;
    }

    function showIncomingCall(data) {
        const notification = document.createElement('div');
        notification.className = 'incoming-call';
        notification.innerHTML = `
            <div class="incoming-avatar">${data.fromName[0].toUpperCase()}</div>
            <div class="incoming-info">
                <div class="incoming-name">${escapeHtml(data.fromName)}</div>
                <div class="incoming-type">${data.callType === 'video' ? '📹 Видеозвонок' : '🎙️ Аудиозвонок'}</div>
            </div>
            <div class="incoming-actions">
                <button class="incoming-btn incoming-accept" id="acceptBtn">✅</button>
                <button class="incoming-btn incoming-reject" id="rejectBtn">❌</button>
            </div>
        `;
        document.body.appendChild(notification);
        const accept = () => {
            notification.remove();
            currentCall = { targetId: data.from, callType: data.callType };
            document.getElementById('callWithName').textContent = `Разговор с ${data.fromName}`;
            document.getElementById('callStatusText').innerHTML = 'Соединение...';
            navigator.mediaDevices.getUserMedia({ video: data.callType === 'video', audio: true })
                .then(stream => {
                    localStream = stream;
                    socket.emit('accept-call', { fromId: data.from });
                    if (data.callType === 'video') showCallUI('video');
                    else showCallUI('audio');
                })
                .catch(err => {
                    showNotification('Не удалось получить доступ к камере/микрофону', true);
                    endCall();
                });
        };
        const reject = () => {
            notification.remove();
            socket.emit('reject-call', { fromId: data.from });
        };
        document.getElementById('acceptBtn').onclick = accept;
        document.getElementById('rejectBtn').onclick = reject;
        // авто-отмена через 30 секунд
        setTimeout(() => { if (notification.parentNode) reject(); }, 30000);
    }

    function endCall() {
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
        currentCall = null;
        stopTimer();
        document.getElementById('callWithName').textContent = 'Готов к звонкам';
        document.getElementById('callStatusText').innerHTML = '';
        document.getElementById('callContent').innerHTML = `
            <div class="call-status-screen">
                <div class="call-status-icon">📞</div>
                <div class="call-status-message">Звонок завершён</div>
                <div class="call-status-sub">Выберите контакт для нового звонка</div>
            </div>
        `;
    }

    async function makeCall(targetId, callType) {
        if (currentCall) { showNotification('Уже есть активный звонок'); return; }
        currentCall = { targetId, callType };
        document.getElementById('callWithName').textContent = `Звонок...`;
        document.getElementById('callStatusText').innerHTML = 'Ожидание ответа';
        socket.emit('call-user', { targetId, callType });
        document.getElementById('callContent').innerHTML = `
            <div class="call-status-screen">
                <div class="call-status-icon">📞</div>
                <div class="call-status-message">Ожидание ответа...</div>
                <div style="margin-top: 30px;"><button class="control-btn end-call" id="cancelCallBtn">📞 Отменить</button></div>
            </div>
        `;
        document.getElementById('cancelCallBtn').onclick = () => {
            endCall();
            socket.emit('end-call', { targetId });
        };
        if (window.innerWidth <= 768) closeMobileMenu();
    }

    function renderContacts(users) {
        if (!users.length) { contactsList.innerHTML = '<div style="padding:20px;text-align:center;color:#8b949e;">Нет пользователей онлайн</div>'; return; }
        contactsList.innerHTML = users.map(u => `
            <div class="contact-item">
                <div class="contact-avatar">${escapeHtml(u.username[0].toUpperCase())}</div>
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(u.username)}</div>
                    <div class="contact-status">● Онлайн</div>
                </div>
                <div class="call-buttons">
                    <button class="call-icon" onclick="event.stopPropagation(); makeCall('${u.userId}', 'audio')">🎙️</button>
                    <button class="call-icon" onclick="event.stopPropagation(); makeCall('${u.userId}', 'video')">📹</button>
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    window.makeCall = makeCall;
</script>
</body>
</html>
