<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craheapp Messenger</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --tg-blue: #248bcf;
            --tg-bg: #0f1721;
            --tg-sidebar: #17212b;
            --tg-chat-bg: #0e1621;
            --tg-hover: #202b36;
            --tg-text: #ffffff;
            --tg-text-muted: #708499;
            --tg-sent-msg: #2b5278;
            --tg-border: #111923;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-bg);
            color: var(--tg-text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Авторизация (Overlay) --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--tg-bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        .auth-card {
            background: var(--tg-sidebar);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .auth-card h2 { margin-bottom: 20px; font-weight: 600; }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--tg-border);
            background: var(--tg-bg);
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--tg-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:hover { opacity: 0.9; }

        /* --- Основной интерфейс --- */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Боковая панель (Sidebar) */
        .sidebar {
            width: 350px;
            background: var(--tg-sidebar);
            border-right: 1px solid var(--tg-border);
            display: flex;
            flex-direction: column;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-bar {
            background: var(--tg-bg);
            border-radius: 10px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            margin: 0 15px 10px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            margin: 0;
            padding: 5px;
            font-size: 14px;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-item:hover { background: var(--tg-hover); }
        .user-item.active { background: var(--tg-blue); }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #50a7ea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            flex-shrink: 0;
        }

        .user-info-brief {
            flex: 1;
            overflow: hidden;
        }

        .user-info-brief h4 {
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-online { color: var(--tg-blue); font-size: 13px; }

        /* Главное окно чата */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--tg-chat-bg);
            position: relative;
        }

        .chat-header {
            height: 60px;
            padding: 0 20px;
            background: var(--tg-sidebar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-border);
            z-index: 10;
        }

        .chat-header-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            display: none;
            cursor: pointer;
            margin-right: 10px;
        }

        /* Сообщения */
        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }

        .message {
            max-width: 70%;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
        }

        .msg-in {
            align-self: flex-start;
            background: var(--tg-sidebar);
            border-bottom-left-radius: 4px;
        }

        .msg-out {
            align-self: flex-end;
            background: var(--tg-sent-msg);
            border-bottom-right-radius: 4px;
        }

        /* Поле ввода */
        .input-area {
            padding: 10px 20px calc(10px + var(--safe-area-bottom));
            background: var(--tg-sidebar);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .message-input {
            margin-bottom: 0;
            background: transparent;
            border: none;
        }

        /* Кнопки звонков (в точности как в TG) */
        .call-btn-header {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .call-btn-header:hover { background: rgba(255,255,255,0.1); }

        .call-btn-header svg {
            width: 22px;
            height: 22px;
            fill: var(--tg-text-muted);
        }

        /* --- Mobile Adaptivity --- */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: absolute;
                height: 100%;
                z-index: 20;
            }

            .sidebar.hidden {
                transform: translateX(-100%);
            }

            .chat-main {
                width: 100%;
            }

            .back-btn { display: block; }
        }

        .empty-chat {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--tg-text-muted);
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2>Craheapp</h2>
            <p style="color: var(--tg-text-muted); margin-bottom: 20px;">Введите ваше имя для начала</p>
            <input type="text" id="username-input" placeholder="Ваше имя">
            <button class="btn-primary" onclick="login()">Войти</button>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Чаты</h3>
            </div>
            <div class="search-bar">
                <svg width="18" height="18" fill="var(--tg-text-muted)" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                <input type="text" placeholder="Поиск">
            </div>
            <div class="user-list" id="contacts-list">
                </div>
        </aside>

        <main class="chat-main">
            <div id="no-chat-selected" class="empty-chat">
                <span>Выберите чат, чтобы начать общение</span>
            </div>

            <div id="chat-window" class="hidden" style="height: 100%; display: none; flex-direction: column;">
                <header class="chat-header">
                    <div class="chat-header-user">
                        <div class="back-btn" onclick="closeChat()">
                            <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </div>
                        <div class="user-avatar" id="current-chat-avatar" style="width: 40px; height: 40px; font-size: 14px;"></div>
                        <div>
                            <div id="current-chat-name" style="font-weight: 600;"></div>
                            <div class="status-online">в сети</div>
                        </div>
                    </div>
                    <div class="chat-header-actions">
                        <div class="call-btn-header" onclick="makeCall()">
                            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                        </div>
                    </div>
                </header>

                <div class="messages-container" id="messages">
                    </div>

                <div class="input-area">
                    <input type="text" id="msg-input" class="message-input" placeholder="Написать сообщение...">
                    <button class="call-btn-header" style="background: transparent; border: none;" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="#248bcf"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const socket = io();
        let currentUser = JSON.parse(localStorage.getItem('craheapp_user')) || null;
        let activeChat = null;

        // Логика входа
        function login() {
            const name = document.getElementById('username-input').value;
            if (!name) return;
            
            currentUser = {
                id: 'u_' + Math.random().toString(36).substr(2, 9),
                name: name
            };
            
            localStorage.setItem('craheapp_user', JSON.stringify(currentUser));
            document.getElementById('auth-overlay').style.display = 'none';
            initApp();
        }

        if (currentUser) {
            document.getElementById('auth-overlay').style.display = 'none';
            initApp();
        }

        function initApp() {
            socket.emit('call:register', { userId: currentUser.id, username: currentUser.name });
            
            // Запрос списка пользователей
            socket.emit('get-users');
        }

        socket.on('user-list', (users) => {
            const listEl = document.getElementById('contacts-list');
            listEl.innerHTML = '';
            
            users.filter(u => u.userId !== currentUser.id).forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <div class="user-avatar">${user.username[0]}</div>
                    <div class="user-info-brief">
                        <h4>${user.username}</h4>
                        <div class="status-online">в сети</div>
                    </div>
                `;
                div.onclick = () => openChat(user);
                listEl.appendChild(div);
            });
        });

        function openChat(user) {
            activeChat = user;
            document.getElementById('no-chat-selected').style.display = 'none';
            const chatWindow = document.getElementById('chat-window');
            chatWindow.style.display = 'flex';
            chatWindow.classList.remove('hidden');
            
            document.getElementById('current-chat-name').innerText = user.username;
            document.getElementById('current-chat-avatar').innerText = user.username[0];
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('hidden');
            }
        }

        function closeChat() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chat-window').style.display = 'none';
        }

        // Логика звонка (Связь с call.html)
        function makeCall() {
            if (!activeChat) return;

            const callParams = {
                type: 'private',
                targetUserId: activeChat.userId,
                targetUsername: activeChat.username,
                myUserId: currentUser.id,
                myUsername: currentUser.name,
                isIncoming: false
            };

            localStorage.setItem('craheapp_call', JSON.stringify(callParams));
            window.open('/call.html', '_blank', 'width=400,height=700');
        }

        // Входящий звонок
        socket.on('call:request', (data) => {
            const callParams = {
                type: 'private',
                fromUserId: data.from,
                fromUsername: data.fromName,
                myUserId: currentUser.id,
                myUsername: currentUser.name,
                isIncoming: true
            };

            localStorage.setItem('craheapp_call', JSON.stringify(callParams));
            window.open('/call.html', '_blank', 'width=400,height=700');
        });

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value;
            if (!text || !activeChat) return;

            const msgDiv = document.createElement('div');
            msgDiv.className = 'message msg-out';
            msgDiv.innerText = text;
            document.getElementById('messages').appendChild(msgDiv);
            input.value = '';
            
            // Здесь должна быть socket.emit('chat:message', ...)
        }
    </script>
</body>
</html>
