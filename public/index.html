<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TelegramCall - Бесплатные видеозвонки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
        }
        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .auth-card {
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-card h1 {
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: #1a1a2e;
            border: 1px solid #2ea6ff;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .telegram-header {
            background: #1a1a2e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2ea6ff;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
        }
        .main-grid {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .contacts-sidebar {
            width: 320px;
            background: #0f0f1a;
            border-right: 1px solid #2ea6ff;
            display: flex;
            flex-direction: column;
        }
        .contacts-header {
            padding: 16px;
            border-bottom: 1px solid #2ea6ff;
            font-weight: 600;
        }
        .contacts-list {
            flex: 1;
            overflow-y: auto;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .contact-item:hover {
            background: #1a1a2e;
        }
        .contact-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2ea6ff, #0088cc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
        }
        .contact-info {
            flex: 1;
        }
        .contact-name {
            font-weight: 600;
        }
        .contact-status {
            font-size: 12px;
            color: #2ea6ff;
        }
        .call-buttons {
            display: flex;
            gap: 8px;
        }
        .call-icon {
            background: #2ea6ff;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        .call-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }
        .call-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #2ea6ff;
        }
        .video-container {
            flex: 1;
            position: relative;
            background: #000;
        }
        .remote-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #2ea6ff;
            cursor: pointer;
            z-index: 10;
        }
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            background: #1a1a2e;
        }
        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 24px;
            transition: transform 0.2s;
        }
        .control-btn:hover {
            transform: scale(1.05);
        }
        .control-btn.end-call {
            background: #dc2626;
            color: white;
        }
        .control-btn.toggle {
            background: #2ea6ff;
            color: white;
        }
        .incoming-call {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a2e;
            border: 2px solid #2ea6ff;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            gap: 15px;
            z-index: 200;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .hidden { display: none; }
        .call-status-text {
            text-align: center;
            padding: 40px;
            color: #8b949e;
        }
        .debug-info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: #666;
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="authContainer" class="auth-container">
    <div class="auth-card">
        <div class="logo-icon" style="margin: 0 auto 20px; width: 60px; height: 60px; font-size: 30px;">📞</div>
        <h1>TelegramCall</h1>
        <p style="color: #8b949e; margin-bottom: 30px;">Бесплатные видеозвонки</p>
        <input type="text" id="regUsername" class="auth-input" placeholder="Ваше имя">
        <input type="text" id="regUserId" class="auth-input" placeholder="Ваш ID (например: mama)">
        <button class="auth-btn" id="registerBtn">Зарегистрироваться</button>
        <p style="font-size: 12px; color: #8b949e; margin-top: 20px;">Скажите свой ID собеседнику, чтобы он мог вам позвонить!</p>
    </div>
</div>

<div id="appContainer" class="app-container hidden">
    <div class="telegram-header">
        <div class="logo">
            <div class="logo-icon">📞</div>
            <span>TelegramCall</span>
        </div>
        <div class="user-info">
            <span id="currentUserName"></span>
            <div class="avatar" id="userAvatar"></div>
        </div>
    </div>
    <div class="main-grid">
        <div class="contacts-sidebar">
            <div class="contacts-header">Контакты онлайн</div>
            <div class="contacts-list" id="contactsList"></div>
        </div>
        <div class="call-area" id="callArea">
            <div class="call-header">
                <h2 id="callWithName">Готов к звонкам</h2>
                <div id="callStatusText" style="font-size: 12px; color: #8b949e;"></div>
            </div>
            <div id="callContent">
                <div class="call-status-text">
                    📞 Выберите контакт и нажмите на звонок<br>
                    <small style="color: #8b949e;">Бесплатные P2P видеозвонки</small>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="debugInfo" class="debug-info"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
    let socket = null;
    let currentUser = null;
    let peerConnection = null;
    let localStream = null;
    let currentCall = null;

    const authContainer = document.getElementById('authContainer');
    const appContainer = document.getElementById('appContainer');
    const registerBtn = document.getElementById('registerBtn');
    const contactsList = document.getElementById('contactsList');
    const debugInfo = document.getElementById('debugInfo');

    function debugLog(message) {
        console.log(message);
        debugInfo.innerHTML = message;
        setTimeout(() => {
            if (debugInfo.innerHTML === message) {
                debugInfo.innerHTML = '';
            }
        }, 3000);
    }

    registerBtn.addEventListener('click', async () => {
        const username = document.getElementById('regUsername').value.trim();
        const userId = document.getElementById('regUserId').value.trim();
        if (!username || !userId) {
            alert('Заполните все поля');
            return;
        }
        currentUser = { username, userId };
        
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, userId })
        });
        
        if (response.ok) {
            socket = io({
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                debugLog('✅ WebSocket подключен');
                socket.emit('register', { username, userId });
            });
            
            setupSocketListeners();
            authContainer.classList.add('hidden');
            appContainer.classList.remove('hidden');
            document.getElementById('currentUserName').textContent = username;
            document.getElementById('userAvatar').textContent = username[0].toUpperCase();
        }
    });

    function setupSocketListeners() {
        socket.on('user-list', (users) => {
            renderContacts(users.filter(u => u.userId !== currentUser.userId));
        });
        
        socket.on('incoming-call', (data) => {
            debugLog(`📞 Входящий звонок от ${data.fromName}`);
            showIncomingCall(data);
        });
        
        socket.on('call-accepted', async (data) => {
            debugLog(`✅ Звонок принят ${data.targetName}`);
            document.getElementById('callStatusText').innerHTML = 'Соединение устанавливается...';
            await startCall(data.targetId, currentCall?.callType);
        });
        
        socket.on('call-rejected', () => {
            debugLog('❌ Звонок отклонён');
            endCall();
            showNotification('Звонок отклонён');
        });
        
        socket.on('call-error', (data) => {
            debugLog(`❌ Ошибка: ${data.message}`);
            endCall();
            showNotification(data.message);
        });
        
        socket.on('call-ended', () => {
            debugLog('📴 Звонок завершён');
            endCall();
            showNotification('Звонок завершён');
        });
        
        socket.on('offer', async (data) => {
            debugLog(`📡 Получен offer от ${data.from}`);
            await handleOffer(data);
        });
        
        socket.on('answer', async (data) => {
            debugLog(`📡 Получен answer от ${data.from}`);
            await handleAnswer(data);
        });
        
        socket.on('ice-candidate', async (data) => {
            debugLog(`❄️ Получен ICE кандидат от ${data.from}`);
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) {
                    console.error('ICE candidate error:', e);
                }
            }
        });
    }

    async function startCall(targetId, callType) {
        try {
            debugLog(`🎥 Начинаем звонок, тип: ${callType}`);
            
            localStream = await navigator.mediaDevices.getUserMedia({
                video: callType === 'video',
                audio: true
            });
            
            debugLog('✅ Локальный поток получен');
            
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            };
            
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
                debugLog(`➕ Добавлен трек: ${track.kind}`);
            });
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    debugLog(`❄️ Отправляем ICE кандидат`);
                    socket.emit('ice-candidate', {
                        targetId: targetId,
                        candidate: event.candidate
                    });
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                debugLog(`🔌 ICE состояние: ${peerConnection.iceConnectionState}`);
                if (peerConnection.iceConnectionState === 'connected') {
                    document.getElementById('callStatusText').innerHTML = 'Соединение установлено!';
                } else if (peerConnection.iceConnectionState === 'failed') {
                    debugLog('❌ ICE соединение не удалось');
                    showNotification('Не удалось установить соединение');
                }
            };
            
            peerConnection.ontrack = (event) => {
                debugLog(`📺 Получен удалённый трек: ${event.track.kind}`);
                const remoteVideo = document.getElementById('remoteVideo');
                if (remoteVideo && event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                    remoteVideo.play().catch(e => console.log('Play error:', e));
                }
            };
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            debugLog('📡 Отправляем offer');
            
            socket.emit('offer', {
                targetId: targetId,
                offer: offer
            });
            
            showCallUI(callType);
            
        } catch (error) {
            debugLog(`❌ Ошибка: ${error.message}`);
            console.error(error);
            alert('Не удалось начать звонок. Проверьте микрофон и камеру.');
            endCall();
        }
    }

    async function handleOffer(data) {
        try {
            debugLog(`📡 Обработка offer от ${data.from}`);
            
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            };
            
            if (!peerConnection) {
                peerConnection = new RTCPeerConnection(configuration);
                
                if (localStream) {
                    localStream.getTracks().forEach(track => {
                        peerConnection.addTrack(track, localStream);
                        debugLog(`➕ Добавлен трек: ${track.kind}`);
                    });
                }
                
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        debugLog(`❄️ Отправляем ICE кандидат`);
                        socket.emit('ice-candidate', {
                            targetId: data.from,
                            candidate: event.candidate
                        });
                    }
                };
                
                peerConnection.oniceconnectionstatechange = () => {
                    debugLog(`🔌 ICE состояние: ${peerConnection.iceConnectionState}`);
                };
                
                peerConnection.ontrack = (event) => {
                    debugLog(`📺 Получен удалённый трек: ${event.track.kind}`);
                    const remoteVideo = document.getElementById('remoteVideo');
                    if (remoteVideo && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                        remoteVideo.play().catch(e => console.log('Play error:', e));
                    }
                };
            }
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            debugLog('📡 Отправляем answer');
            
            socket.emit('answer', {
                targetId: data.from,
                answer: answer
            });
            
        } catch (error) {
            debugLog(`❌ Ошибка обработки offer: ${error.message}`);
            console.error(error);
        }
    }

    async function handleAnswer(data) {
        if (peerConnection) {
            debugLog(`📡 Устанавливаем remote description из answer`);
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        }
    }

    async function makeCall(targetId, callType) {
        if (currentCall) {
            showNotification('Уже есть активный звонок');
            return;
        }
        
        currentCall = { targetId, callType };
        document.getElementById('callWithName').textContent = `Звонок...`;
        document.getElementById('callStatusText').innerHTML = 'Ожидание ответа...';
        
        debugLog(`📞 Звоним ${targetId}, тип: ${callType}`);
        socket.emit('call-user', { targetId, callType });
        
        const callContent = document.getElementById('callContent');
        callContent.innerHTML = `
            <div class="call-status-text">
                <div style="font-size: 48px;">📞</div>
                <div>Ожидание ответа...</div>
            </div>
            <div class="call-controls">
                <button class="control-btn end-call" id="endCallBtn">📞 Отменить</button>
            </div>
        `;
        
        document.getElementById('endCallBtn').onclick = () => {
            endCall();
            socket.emit('end-call', { targetId });
        };
    }

    function showCallUI(callType) {
        const callContent = document.getElementById('callContent');
        
        if (callType === 'video') {
            callContent.innerHTML = `
                <div class="video-container" id="videoContainer">
                    <video id="remoteVideo" class="remote-video" autoplay playsinline></video>
                    <video id="localVideo" class="local-video" autoplay playsinline muted></video>
                </div>
                <div class="call-controls">
                    <button class="control-btn toggle" id="toggleMuteBtn">🎤</button>
                    <button class="control-btn toggle" id="toggleVideoBtn">📹</button>
                    <button class="control-btn end-call" id="endCallBtn">📞</button>
                </div>
            `;
            
            if (localStream) {
                document.getElementById('localVideo').srcObject = localStream;
            }
            
            let muted = false;
            let videoOff = false;
            
            document.getElementById('toggleMuteBtn').onclick = () => {
                if (localStream) {
                    muted = !muted;
                    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
                    document.getElementById('toggleMuteBtn').style.opacity = muted ? '0.5' : '1';
                    document.getElementById('toggleMuteBtn').style.background = muted ? '#666' : '#2ea6ff';
                }
            };
            
            document.getElementById('toggleVideoBtn').onclick = () => {
                if (localStream) {
                    videoOff = !videoOff;
                    localStream.getVideoTracks().forEach(t => t.enabled = !videoOff);
                    document.getElementById('toggleVideoBtn').style.opacity = videoOff ? '0.5' : '1';
                    document.getElementById('toggleVideoBtn').style.background = videoOff ? '#666' : '#2ea6ff';
                }
            };
        } else {
            callContent.innerHTML = `
                <div class="call-status-text">
                    <div style="font-size: 80px;">🎙️</div>
                    <div>Аудиозвонок в процессе...</div>
                </div>
                <div class="call-controls">
                    <button class="control-btn toggle" id="toggleMuteBtn">🎤</button>
                    <button class="control-btn end-call" id="endCallBtn">📞</button>
                </div>
            `;
            
            let muted = false;
            document.getElementById('toggleMuteBtn').onclick = () => {
                if (localStream) {
                    muted = !muted;
                    localStream.getAudioTracks().forEach(t => t.enabled = !muted);
                    document.getElementById('toggleMuteBtn').style.opacity = muted ? '0.5' : '1';
                    document.getElementById('toggleMuteBtn').style.background = muted ? '#666' : '#2ea6ff';
                }
            };
        }
        
        document.getElementById('endCallBtn').onclick = () => {
            endCall();
            if (currentCall) {
                socket.emit('end-call', { targetId: currentCall.targetId });
            }
        };
    }

    function showIncomingCall(data) {
        const notification = document.createElement('div');
        notification.className = 'incoming-call';
        notification.innerHTML = `
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="contact-avatar" style="width: 50px; height: 50px;">${data.fromName[0].toUpperCase()}</div>
                <div>
                    <div><strong>${data.fromName}</strong></div>
                    <div>${data.callType === 'video' ? '📹 Видеозвонок' : '🎙️ Аудиозвонок'}</div>
                </div>
                <button id="acceptCallBtn" style="background: #22c55e; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer;">✅</button>
                <button id="rejectCallBtn" style="background: #dc2626; border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 24px; cursor: pointer;">❌</button>
            </div>
        `;
        document.body.appendChild(notification);
        
        document.getElementById('acceptCallBtn').onclick = async () => {
            notification.remove();
            currentCall = { targetId: data.from, callType: data.callType };
            document.getElementById('callWithName').textContent = `Разговор с ${data.fromName}`;
            document.getElementById('callStatusText').innerHTML = 'Соединение...';
            
            debugLog(`✅ Принимаем звонок от ${data.fromName}`);
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: data.callType === 'video',
                    audio: true
                });
                debugLog('✅ Локальный поток получен для ответа');
                
                socket.emit('accept-call', { fromId: data.from });
                
                if (data.callType === 'video') {
                    showCallUI('video');
                } else {
                    showCallUI('audio');
                }
            } catch (error) {
                debugLog(`❌ Ошибка: ${error.message}`);
                alert('Не удалось получить доступ к камере/микрофону');
                endCall();
            }
        };
        
        document.getElementById('rejectCallBtn').onclick = () => {
            notification.remove();
            debugLog(`❌ Отклоняем звонок от ${data.fromName}`);
            socket.emit('reject-call', { fromId: data.from });
        };
    }

    function endCall() {
        debugLog('📴 Завершаем звонок');
        
        if (peerConnection) {
            peerConnection.close();
            peerConnection = null;
        }
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        currentCall = null;
        
        document.getElementById('callWithName').textContent = 'Готов к звонкам';
        document.getElementById('callStatusText').innerHTML = '';
        
        const callContent = document.getElementById('callContent');
        callContent.innerHTML = `
            <div class="call-status-text">
                📞 Звонок завершён<br>
                <small style="color: #8b949e;">Выберите контакт для нового звонка</small>
            </div>
        `;
    }

    function renderContacts(users) {
        if (users.length === 0) {
            contactsList.innerHTML = '<div style="padding: 20px; text-align: center; color: #8b949e;">Нет пользователей онлайн</div>';
            return;
        }
        
        contactsList.innerHTML = users.map(user => `
            <div class="contact-item">
                <div class="contact-avatar">${user.username[0].toUpperCase()}</div>
                <div class="contact-info">
                    <div class="contact-name">${user.username}</div>
                    <div class="contact-status">● Онлайн</div>
                </div>
                <div class="call-buttons">
                    <button class="call-icon" onclick="makeCall('${user.userId}', 'audio')">🎙️</button>
                    <button class="call-icon" onclick="makeCall('${user.userId}', 'video')">📹</button>
                </div>
            </div>
        `).join('');
    }

    function showNotification(message) {
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed; top: 80px; right: 20px; background: #1a1a2e;
            border-left: 4px solid #2ea6ff; padding: 12px 20px;
            border-radius: 8px; z-index: 1000; animation: slideIn 0.3s ease;
        `;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }

    window.makeCall = makeCall;
</script>
</body>
</html>
