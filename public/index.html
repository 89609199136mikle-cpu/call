<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Craneapp Messenger</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <style>
        :root {
            /* Light Theme (Default) */
            --primary: #0088cc;
            --primary-soft: rgba(0, 136, 204, 0.1);
            --bg: #ffffff;
            --bg-secondary: #f4f4f5;
            --text: #0e0e0e;
            --text-muted: #707579;
            --border: #dfe1e5;
            --error: #ff595a;
            --success: #34c759;
            --bubble-out: #effdde;
            --bubble-in: #ffffff;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        [data-theme="dark"] {
            --bg: #1c1c1d;
            --bg-secondary: #0e0e0e;
            --text: #ffffff;
            --text-muted: #aaaaaa;
            --border: #2c2c2e;
            --bubble-out: #2b5278;
            --bubble-in: #212d3b;
        }

        [data-theme="telegram"] {
            --primary: #2481cc;
            --bg: #17212b;
            --bg-secondary: #0e1621;
            --bubble-out: #2b5278;
            --bubble-in: #182533;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden; /* Фикс скролла для мобилок */
            height: 100vh;
            width: 100vw;
        }

        /* --- Layout Structure --- */
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        header {
            height: calc(56px + var(--safe-area-top));
            padding-top: var(--safe-area-top);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding-inline: 16px;
            z-index: 100;
        }

        main {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        nav#tab-bar {
            height: calc(60px + var(--safe-area-bottom));
            padding-bottom: var(--safe-area-bottom);
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        /* --- Components --- */
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            text-decoration: none;
            transition: color 0.2s;
        }

        .tab-item.active { color: var(--primary); }

        .tab-item svg {
            width: 26px;
            height: 26px;
            margin-bottom: 4px;
        }

        /* Chat List Style */
        .chat-item {
            display: flex;
            padding: 12px 16px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:active { background: var(--bg-secondary); }

        .avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .chat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name { font-weight: 600; font-size: 16px; }
        .chat-time { font-size: 12px; color: var(--text-muted); }
        .chat-last-msg {
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        /* Message Bubbles */
        .messages-container {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .bubble {
            max-width: 75%;
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 15px;
            position: relative;
            line-height: 1.4;
        }

        .bubble.in {
            align-self: flex-start;
            background: var(--bubble-in);
            border-bottom-left-radius: 4px;
        }

        .bubble.out {
            align-self: flex-end;
            background: var(--bubble-out);
            border-bottom-right-radius: 4px;
        }

        /* Forms & Inputs */
        .input-area {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
        }

        .message-input {
            flex: 1;
            background: var(--bg-secondary);
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            outline: none;
        }

        /* Modals & Overlays */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

<div id="app">
    <header id="main-header">
        <div style="flex: 1; font-size: 20px; font-weight: bold;" id="header-title">Craneapp</div>
        <div id="header-actions">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
    </header>

    <main id="router-view">
        </main>

    <nav id="tab-bar">
        <a href="#contacts" class="tab-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Контакты</span>
        </a>
        <a href="#calls" class="tab-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l2.28-2.28a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            <span>Звонки</span>
        </a>
        <a href="#chats" class="tab-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span>Чаты</span>
        </a>
        <a href="#settings" class="tab-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Настройки</span>
        </a>
    </nav>
</div>

<div class="overlay" id="global-overlay"></div>
<script type="module">
    /**
     * CORE CRANE ENGINE
     * Управляет данными и рендерингом без лишних библиотек
     */
    const Crane = {
        state: {
            currentRoute: 'chats',
            user: { name: 'Admin', id: '1' },
            activeChat: null,
            theme: localStorage.getItem('theme') || 'dark'
        },

        // Шаблоны экранов
        templates: {
            chats: () => `
                <div class="chat-list">
                    ${[1,2,3,4,5].map(i => `
                        <div class="chat-item" onclick="Crane.navigate('chat-view', ${i})">
                            <div class="avatar">${String.fromCharCode(64 + i)}</div>
                            <div class="chat-info">
                                <div class="chat-row">
                                    <span class="chat-name">Группа разработчиков ${i}</span>
                                    <span class="chat-time">14:49</span>
                                </div>
                                <div class="chat-row">
                                    <span class="chat-last-msg">Привет! Как успехи по проекту на Railway?</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `,

            'chat-view': (id) => `
                <div style="display:flex; flex-direction:column; height:100%;">
                    <div class="messages-container" style="flex:1; overflow-y:auto;">
                        <div class="bubble in">Добро пожаловать в Craneapp!</div>
                        <div class="bubble out">Этот интерфейс полностью готов к интеграции с вашим бэкендом.</div>
                        <div class="bubble in">Используйте Redis для сессий и PostgreSQL для сообщений.</div>
                    </div>
                    <div class="input-area">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        <input type="text" class="message-input" placeholder="Сообщение...">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0088cc" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </div>
                </div>
            `,

            settings: () => `
                <div style="padding: 20px;">
                    <h2 style="margin-bottom:20px;">Настройки</h2>
                    <div class="setting-row" style="display:flex; justify-content:space-between; padding: 15px 0; border-bottom:1px solid var(--border);">
                        <span>Темная тема</span>
                        <input type="checkbox" checked onchange="Crane.toggleTheme()">
                    </div>
                    <div class="setting-row" style="padding: 15px 0; border-bottom:1px solid var(--border);">
                        <span>Конфиденциальность</span>
                    </div>
                    <div class="setting-row" style="padding: 15px 0; color: var(--error);">
                        <span>Выйти из аккаунта</span>
                    </div>
                </div>
            `
        },

        // Навигация
        navigate(route, params = null) {
            this.state.currentRoute = route;
            const view = document.getElementById('router-view');
            const header = document.getElementById('header-title');
            const tabBar = document.getElementById('tab-bar');

            if (route === 'chat-view') {
                tabBar.style.display = 'none';
                header.innerText = `Чат #${params}`;
            } else {
                tabBar.style.display = 'flex';
                header.innerText = route.charAt(0).toUpperCase() + route.slice(1);
            }

            view.innerHTML = this.templates[route] ? this.templates[route](params) : '<h1>404</h1>';
            
            // Обновляем активную иконку
            document.querySelectorAll('.tab-item').forEach(el => {
                el.classList.toggle('active', el.getAttribute('href') === `#${route}`);
            });
        },

        toggleTheme() {
            const newTheme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        },

        init() {
            // Применяем тему
            document.documentElement.setAttribute('data-theme', this.state.theme);

            // Обработка кликов по таб-бару
            document.querySelectorAll('.tab-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const route = item.getAttribute('href').replace('#', '');
                    this.navigate(route);
                });
            });

            // Рендерим начальную страницу
            this.navigate('chats');

            console.log('🏗️ Crane Engine Initialized');
        }
    };

    // Делаем Crane доступным глобально для onclick в шаблонах
    window.Crane = Crane;

    // Запуск после загрузки DOM
    document.addEventListener('DOMContentLoaded', () => Crane.init());
</script>
</body>
</html>
